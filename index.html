<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kazi ni Kazi · Find Services, Homes & Jobs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f3f2ef;
            color: #191919;
        }

        /* LinkedIn-style navbar */
        .navbar {
            background: white;
            border-bottom: 1px solid #e0e4e8;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .logo-area img {
            height: 40px;
            width: auto;
        }
        .logo-text {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0a66c2, #00a3ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-buttons {
            display: flex;
            gap: 1rem;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #0a66c2;
            color: #0a66c2;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-outline:hover {
            background: rgba(10,102,194,0.05);
        }
        .btn-primary {
            background: #0a66c2;
            color: white;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-primary:hover {
            background: #004182;
        }

        /* Main container */
        .container {
            max-width: 1400px;
            margin: 1.5rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
        }

        /* Main content card */
        .main-content {
            background: white;
            border-radius: 1rem;
            border: 1px solid #e0e4e8;
            overflow: hidden;
        }

        /* Navigation Tabs (LinkedIn style) */
        .tabs {
            display: flex;
            border-bottom: 1px solid #e0e4e8;
            background: white;
        }
        .tab-btn {
            flex: 1;
            padding: 1rem;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            border: none;
            font-size: 1rem;
            color: #5e6f8d;
        }
        .tab-btn.active {
            color: #0a66c2;
            border-bottom: 3px solid #0a66c2;
        }

        /* Filter & Search Area */
        .filter-area {
            padding: 1rem;
            background: #f8fafc;
            border-bottom: 1px solid #e0e4e8;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }
        .filter-area input, .filter-area select {
            padding: 0.5rem 0.8rem;
            border: 1px solid #cbd5e1;
            border-radius: 2rem;
            font-family: inherit;
            flex: 1;
            min-width: 150px;
            background: white;
        }
        .filter-area button {
            background: #0a66c2;
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
        }

        /* Content area */
        .content-area {
            padding: 1.5rem;
            min-height: 500px;
        }

        /* Horizontal scroll for services (freelancers) */
        .horizontal-scroll {
            display: flex;
            overflow-x: auto;
            gap: 1rem;
            padding-bottom: 0.5rem;
            scrollbar-width: thin;
        }
        .person-card {
            flex: 0 0 220px;
            background: white;
            border: 1px solid #e0e4e8;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .person-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-color: #0a66c2;
        }
        .person-avatar {
            width: 80px;
            height: 80px;
            background: #0a66c2;
            border-radius: 50%;
            margin: 0 auto 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            font-weight: 600;
        }
        .person-name {
            font-weight: 700;
        }
        .person-title {
            font-size: 0.75rem;
            color: #5e6f8d;
        }
        .rating {
            color: #fbbf24;
            font-size: 0.8rem;
        }

        /* Jobs list */
        .job-item {
            border: 1px solid #e0e4e8;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .job-item:hover {
            background: #faf9f8;
            transform: translateX(4px);
            border-color: #0a66c2;
        }
        .job-title {
            font-weight: 700;
            font-size: 1.1rem;
        }
        .job-meta {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 0.3rem;
        }

        /* Homes grid */
        .homes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }
        .home-card {
            border: 1px solid #e0e4e8;
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
            background: white;
        }
        .home-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-color: #0a66c2;
        }
        .home-img {
            height: 160px;
            background-size: cover;
            background-position: center;
            background-color: #eef3fc;
        }
        .home-info {
            padding: 0.8rem;
        }

        /* Right Sidebar (admin announcements & ads) */
        .sidebar-right {
            background: white;
            border-radius: 1rem;
            border: 1px solid #e0e4e8;
            padding: 1rem;
            height: fit-content;
            position: sticky;
            top: 90px;
        }
        .announcement {
            background: #fef9e3;
            border-left: 4px solid #eab308;
            padding: 0.8rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }
        .ad {
            background: #eef2ff;
            padding: 0.8rem;
            border-radius: 0.5rem;
            text-align: center;
            margin-bottom: 1rem;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #5e6f8d;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #5e6f8d;
        }
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                padding: 0 1rem;
            }
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1f2937;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            z-index: 1000;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo-area">
        <img src="images/logo.png" alt="Kazi ni Kazi" onerror="this.src='https://placehold.co/140x40?text=KNK'">
        <span class="logo-text">Kazi ni Kazi</span>
    </div>
    <div class="nav-buttons">
        <button class="btn-outline" id="loginBtn">Sign In</button>
        <button class="btn-primary" id="signupBtn">Join</button>
    </div>
</nav>

<div class="container">
    <div class="main-content">
        <div class="tabs">
            <button class="tab-btn active" data-tab="services">1️⃣ Services</button>
            <button class="tab-btn" data-tab="homes">2️⃣ Homes</button>
            <button class="tab-btn" data-tab="jobs">3️⃣ Jobs</button>
        </div>
        <div id="filterContainer" class="filter-area"></div>
        <div id="contentArea" class="content-area">
            <div class="loading">Loading...</div>
        </div>
    </div>
    <div class="sidebar-right">
        <h4><i class="fas fa-bullhorn"></i> Admin Announcements</h4>
        <div class="announcement">
            <strong>📢 Welcome to Kazi ni Kazi!</strong><br>
            Find trusted freelancers, homes, and jobs.
        </div>
        <div class="announcement">
            <strong>✅ Verification Drive</strong><br>
            Get verified badge – increase trust & visibility.
        </div>
        <div class="ad">
            <i class="fas fa-ad" style="color:#0a66c2;"></i><br>
            <strong>Promote your business</strong><br>
            <span style="font-size:0.7rem;">Reach 10k+ professionals</span>
            <button class="btn-outline" style="margin-top:0.3rem; padding:0.2rem 0.8rem;">Advertise</button>
        </div>
        <div class="ad">
            <i class="fas fa-gem"></i><br>
            <strong>Premium Membership</strong><br>
            <span style="font-size:0.7rem;">Unlock exclusive features</span>
        </div>
    </div>
</div>

<script>
    // ---------- PHONE REDIRECT ----------
    if (window.innerWidth <= 768) {
        window.location.href = "indexp.html";
    }

    // ---------- GLOBAL STATE ----------
    let currentTab = "services";
    let currentFilter = "";
    let currentSort = "popularity";

    // Data arrays (initially empty - to be populated from API)
    let freelancers = [];
    let homes = [];
    let jobs = [];

    // Local storage for user preferences (personalization)
    let userInterests = JSON.parse(localStorage.getItem('knk_user_interests')) || { categoryClicks: {}, viewedFreelancers: [] };

    // Helper functions
    function showToast(msg, isErr = false) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#dc2626' : '#1f2937';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function trackCategoryClick(category) {
        userInterests.categoryClicks[category] = (userInterests.categoryClicks[category] || 0) + 1;
        localStorage.setItem('knk_user_interests', JSON.stringify(userInterests));
    }

    function trackFreelancerView(freelancerId) {
        if (!userInterests.viewedFreelancers.includes(freelancerId)) {
            userInterests.viewedFreelancers.push(freelancerId);
            localStorage.setItem('knk_user_interests', JSON.stringify(userInterests));
        }
    }

    function getRecommendedCategory() {
        let maxCat = null;
        let maxCount = 0;
        for (let cat in userInterests.categoryClicks) {
            if (userInterests.categoryClicks[cat] > maxCount) {
                maxCount = userInterests.categoryClicks[cat];
                maxCat = cat;
            }
        }
        return maxCat;
    }

    // ---------- DATA FETCHING (replace with real API endpoints) ----------
    async function fetchFreelancers() {
        try {
            // TODO: Replace with your actual API endpoint
            // const response = await fetch('https://your-api.com/api/freelancers');
            // const data = await response.json();
            // return data;
            
            // For now, return empty array and show demo message
            console.log("Fetch freelancers - integrate with your backend");
            return [];
        } catch (error) {
            console.error("Error fetching freelancers:", error);
            return [];
        }
    }

    async function fetchHomes() {
        try {
            // TODO: Replace with your actual API endpoint
            return [];
        } catch (error) {
            console.error("Error fetching homes:", error);
            return [];
        }
    }

    async function fetchJobs() {
        try {
            // TODO: Replace with your actual API endpoint
            return [];
        } catch (error) {
            console.error("Error fetching jobs:", error);
            return [];
        }
    }

    async function loadAllData() {
        document.getElementById('contentArea').innerHTML = '<div class="loading">Loading data...</div>';
        freelancers = await fetchFreelancers();
        homes = await fetchHomes();
        jobs = await fetchJobs();
        // Refresh current tab view
        refreshCurrentTab();
    }

    // ---------- RENDER FUNCTIONS ----------
    function createPersonCard(f) {
        const initial = f.full_name ? f.full_name.charAt(0).toUpperCase() : '?';
        return `
            <div class="person-card" data-id="${f.id}">
                <div class="person-avatar">${f.avatar_url ? `<img src="${f.avatar_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : initial}</div>
                <div class="person-name">${escapeHtml(f.full_name)}</div>
                <div class="person-title">${escapeHtml(f.primary_skill || f.title || 'Professional')}</div>
                <div class="rating">${renderStars(f.rating || 0)} ${(f.rating || 0).toFixed(1)}</div>
                <div style="font-size:0.7rem;">⭐ ${f.reputation_points || 0} pts</div>
            </div>
        `;
    }

    function renderStars(rating) {
        const full = Math.floor(rating);
        const empty = 5 - full;
        return '★'.repeat(full) + '☆'.repeat(empty);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderServices() {
        if (!freelancers.length) {
            document.getElementById('contentArea').innerHTML = '<div class="empty-state"><i class="fas fa-user-friends" style="font-size:3rem; opacity:0.3;"></i><p>No freelancers found. Check back later!</p></div>';
            return;
        }
        let filtered = [...freelancers];
        if (currentFilter) {
            filtered = filtered.filter(f => 
                f.full_name?.toLowerCase().includes(currentFilter) || 
                f.primary_skill?.toLowerCase().includes(currentFilter) ||
                f.category?.toLowerCase().includes(currentFilter)
            );
        }
        if (currentSort === "popularity") filtered.sort((a,b) => (b.popularity || 0) - (a.popularity || 0));
        else if (currentSort === "points") filtered.sort((a,b) => (b.reputation_points || 0) - (a.reputation_points || 0));
        else if (currentSort === "newest") filtered.sort((a,b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

        const recommendedCat = getRecommendedCategory();
        let html = '';
        if (recommendedCat && filtered.some(f => f.category === recommendedCat)) {
            html += `<h3>🔥 Recommended for you: ${recommendedCat}</h3><div class="horizontal-scroll">`;
            const recs = filtered.filter(f => f.category === recommendedCat);
            recs.forEach(f => html += createPersonCard(f));
            html += `</div><hr style="margin: 1rem 0;"><h3>Other Categories</h3>`;
        }
        const categories = [...new Set(filtered.map(f => f.category).filter(Boolean))];
        for (let cat of categories) {
            if (recommendedCat === cat) continue;
            const catFreelancers = filtered.filter(f => f.category === cat);
            if (!catFreelancers.length) continue;
            html += `<div><h4>${cat}</h4><div class="horizontal-scroll">`;
            catFreelancers.forEach(f => html += createPersonCard(f));
            html += `</div></div><br>`;
        }
        if (!html) html = '<div class="empty-state">No matching freelancers found.</div>';
        document.getElementById('contentArea').innerHTML = html;
        attachPersonCardEvents();
    }

    function attachPersonCardEvents() {
        document.querySelectorAll('.person-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const id = parseInt(card.getAttribute('data-id'));
                const freelancer = freelancers.find(f => f.id === id);
                if (freelancer) {
                    trackCategoryClick(freelancer.category || 'General');
                    trackFreelancerView(id);
                    localStorage.setItem('knk_selected_freelancer', JSON.stringify(freelancer));
                    window.location.href = "profile.html";
                }
            });
        });
    }

    function renderHomes() {
        if (!homes.length) {
            document.getElementById('contentArea').innerHTML = '<div class="empty-state"><i class="fas fa-home" style="font-size:3rem; opacity:0.3;"></i><p>No homes listed yet. Be the first to post!</p></div>';
            return;
        }
        let filtered = [...homes];
        if (currentFilter) {
            filtered = filtered.filter(h => 
                h.title?.toLowerCase().includes(currentFilter) || 
                h.location?.toLowerCase().includes(currentFilter)
            );
        }
        let html = `<div class="homes-grid">`;
        filtered.forEach(home => {
            html += `
                <div class="home-card" data-id="${home.id}">
                    <div class="home-img" style="background-image: url('${home.image_url || 'https://placehold.co/400x200?text=No+Image'}');"></div>
                    <div class="home-info">
                        <div><strong>${escapeHtml(home.title)}</strong></div>
                        <div>📍 ${escapeHtml(home.location)}</div>
                        <div>💰 ${escapeHtml(home.price)}</div>
                        <div>🏠 Host: ${escapeHtml(home.host_name)}</div>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        document.getElementById('contentArea').innerHTML = html;
        document.querySelectorAll('.home-card').forEach(card => {
            card.addEventListener('click', () => {
                showToast("🏡 Home details page coming soon");
            });
        });
    }

    function renderJobs() {
        if (!jobs.length) {
            document.getElementById('contentArea').innerHTML = '<div class="empty-state"><i class="fas fa-briefcase" style="font-size:3rem; opacity:0.3;"></i><p>No jobs posted yet. Check back later!</p></div>';
            return;
        }
        let filtered = [...jobs];
        if (currentFilter) {
            filtered = filtered.filter(j => 
                j.title?.toLowerCase().includes(currentFilter) || 
                j.company?.toLowerCase().includes(currentFilter)
            );
        }
        let html = '';
        filtered.forEach(job => {
            html += `
                <div class="job-item" data-id="${job.id}">
                    <div class="job-title">${escapeHtml(job.title)}</div>
                    <div class="job-meta">🏢 ${escapeHtml(job.company)} | 💰 ${escapeHtml(job.budget)} | 📍 ${escapeHtml(job.location)}</div>
                    <div class="job-desc" style="font-size:0.85rem;">${escapeHtml(job.description?.substring(0, 100))}...</div>
                </div>
            `;
        });
        document.getElementById('contentArea').innerHTML = html;
        document.querySelectorAll('.job-item').forEach(item => {
            item.addEventListener('click', () => {
                const id = parseInt(item.getAttribute('data-id'));
                const job = jobs.find(j => j.id === id);
                localStorage.setItem('knk_selected_job', JSON.stringify(job));
                window.location.href = "job.html";
            });
        });
    }

    // ---------- FILTER UI ----------
    function buildFilterUI() {
        const filterDiv = document.getElementById('filterContainer');
        if (currentTab === "services") {
            filterDiv.innerHTML = `
                <input type="text" id="searchInput" placeholder="Search by name, skill, or category..." value="${currentFilter}">
                <select id="sortSelect">
                    <option value="popularity" ${currentSort === "popularity" ? "selected" : ""}>Sort by Popularity</option>
                    <option value="points" ${currentSort === "points" ? "selected" : ""}>Sort by Points</option>
                    <option value="newest" ${currentSort === "newest" ? "selected" : ""}>Newest First</option>
                </select>
                <button id="applyFilterBtn">Apply</button>
            `;
            document.getElementById('applyFilterBtn')?.addEventListener('click', () => {
                currentFilter = document.getElementById('searchInput').value.toLowerCase();
                currentSort = document.getElementById('sortSelect').value;
                renderServices();
            });
            document.getElementById('searchInput')?.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    currentFilter = e.target.value.toLowerCase();
                    renderServices();
                }
            });
        } 
        else if (currentTab === "homes") {
            filterDiv.innerHTML = `
                <input type="text" id="searchInput" placeholder="Search by title or location..." value="${currentFilter}">
                <button id="applyFilterBtn">Search</button>
            `;
            document.getElementById('applyFilterBtn')?.addEventListener('click', () => {
                currentFilter = document.getElementById('searchInput').value.toLowerCase();
                renderHomes();
            });
        }
        else if (currentTab === "jobs") {
            filterDiv.innerHTML = `
                <input type="text" id="searchInput" placeholder="Search by title or company..." value="${currentFilter}">
                <button id="applyFilterBtn">Search</button>
            `;
            document.getElementById('applyFilterBtn')?.addEventListener('click', () => {
                currentFilter = document.getElementById('searchInput').value.toLowerCase();
                renderJobs();
            });
        }
    }

    function refreshCurrentTab() {
        buildFilterUI();
        if (currentTab === "services") renderServices();
        else if (currentTab === "homes") renderHomes();
        else if (currentTab === "jobs") renderJobs();
    }

    function switchTab(tab) {
        currentTab = tab;
        currentFilter = "";
        currentSort = "popularity";
        refreshCurrentTab();
    }

    // ---------- EVENT LISTENERS ----------
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            switchTab(btn.getAttribute('data-tab'));
        });
    });

    document.getElementById('loginBtn')?.addEventListener('click', () => {
        window.location.href = "auth.html";
    });
    document.getElementById('signupBtn')?.addEventListener('click', () => {
        window.location.href = "auth.html";
    });

    // ---------- INITIAL LOAD ----------
    loadAllData();
</script>
</body>
</html>
