<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kazi ni Kazi · Services, Homes & Jobs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBbhxmAkHJtq3Zs17P4ewHsc8wi8-0M_XI",
            authDomain: "developers-imw.firebaseapp.com",
            databaseURL: "https://developers-imw-default-rtdb.firebaseio.com",
            projectId: "developers-imw",
            storageBucket: "developers-imw.firebasestorage.app",
            messagingSenderId: "182400720989",
            appId: "1:182400720989:web:180f2390f7563f1ec96db4",
            measurementId: "G-R7RDM0PMY8"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.__db = db;
        window.__collection = collection;
        window.__getDocs = getDocs;
        window.__query = query;
        window.__where = where;
        window.__doc = doc;
        window.__getDoc = getDoc;
    </script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#f8fafc;color:#0f172a;font-size:14px;line-height:1.5;overflow-x:hidden;}
        /* loading bar */
        .loading-bar{position:fixed;top:0;left:0;width:100%;height:3px;background:#e2e8f0;z-index:2000;visibility:hidden;}
        .loading-bar .progress{width:0%;height:100%;background:#0a66c2;transition:width 0.3s;}
        .loading-bar.active{visibility:visible;}
        /* navbar */
        .navbar{background:white;border-bottom:1px solid #e2e8f0;padding:0.7rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;position:sticky;top:0;z-index:100;}
        .logo-area{display:flex;align-items:center;gap:0.5rem;}
        .logo-area img{height:32px;}
        .logo-text{font-weight:700;font-size:1.2rem;background:linear-gradient(135deg,#0a66c2,#00a3ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .contact-link{border:1px solid #cbd5e1;padding:0.3rem 1rem;border-radius:30px;font-size:0.8rem;cursor:pointer;}
        /* ticker (admin editable) */
        .ticker{background:#f1f5f9;border-bottom:1px solid #e2e8f0;padding:0.4rem 1rem;overflow:hidden;white-space:nowrap;}
        .ticker-content{display:inline-block;animation:scroll 30s linear infinite;font-size:0.7rem;color:#334155;}
        .ticker-content i{margin:0 8px;color:#5e6f8d;}
        @keyframes scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
        .ticker:hover .ticker-content{animation-play-state:paused;}
        /* layout */
        .container{max-width:1440px;margin:1.5rem auto;padding:0 1.5rem;display:grid;grid-template-columns:1fr 320px;gap:2rem;}
        .main-content{background:white;border-radius:1rem;border:1px solid #e2e8f0;overflow:hidden;}
        .tabs{display:flex;border-bottom:1px solid #e2e8f0;background:white;}
        .tab-btn{flex:1;padding:0.8rem;text-align:center;font-weight:600;cursor:pointer;background:transparent;border:none;color:#475569;}
        .tab-btn.active{color:#0a66c2;border-bottom:2px solid #0a66c2;}
        /* filter area */
        .filter-area{padding:1rem;background:#fafcff;border-bottom:1px solid #e2e8f0;display:flex;flex-wrap:wrap;gap:0.8rem;align-items:flex-end;}
        .filter-group{background:white;border:1px solid #e2e8f0;border-radius:40px;padding:0.3rem 0.8rem;display:flex;align-items:center;gap:0.4rem;flex:1 1 180px;}
        .filter-group i{color:#64748b;font-size:0.8rem;}
        .filter-group input,.filter-group select{width:100%;border:none;background:transparent;font-size:0.8rem;outline:none;font-family:inherit;}
        .searchable-dropdown{position:relative;}
        .dropdown-list{position:absolute;top:100%;left:0;right:0;background:white;border:1px solid #cbd5e1;border-radius:12px;max-height:200px;overflow-y:auto;z-index:20;display:none;}
        .dropdown-list.show{display:block;}
        .dropdown-item{padding:0.5rem 0.8rem;cursor:pointer;font-size:0.75rem;}
        .dropdown-item:hover{background:#eef2ff;}
        .guests-panel{position:absolute;background:white;border:1px solid #e2e8f0;border-radius:16px;padding:1rem;width:260px;z-index:25;display:none;top:100%;right:0;}
        .guest-row{display:flex;justify-content:space-between;margin-bottom:0.8rem;align-items:center;}
        .guest-row button{background:#f1f5f9;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;}
        .price-range{display:flex;gap:0.5rem;}
        .price-range input{width:100px;}
        .filter-area button{background:#0a66c2;color:white;border:none;padding:0.4rem 1.2rem;border-radius:30px;cursor:pointer;font-weight:500;}
        /* content area */
        .content-area{padding:1.2rem;}
        .category-section{margin-bottom:2rem;}
        .category-title{font-weight:700;font-size:1rem;margin-bottom:0.8rem;display:flex;align-items:center;gap:0.5rem;}
        .horizontal-scroll{display:flex;overflow-x:auto;gap:1rem;padding-bottom:0.5rem;}
        .freelancer-card{flex:0 0 200px;background:white;border:1px solid #e2e8f0;border-radius:1rem;padding:0.8rem;text-align:center;cursor:pointer;transition:0.2s;}
        .freelancer-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,0.05);}
        .avatar{width:70px;height:70px;border-radius:50%;margin:0 auto 0.5rem;background:#eef2ff;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:600;color:#0a66c2;overflow:hidden;}
        .avatar img{width:100%;height:100%;object-fit:cover;}
        .name{font-weight:700;font-size:0.85rem;}
        .skill{font-size:0.7rem;color:#475569;}
        .stars{color:#fbbf24;font-size:0.7rem;}
        /* homes grid */
        .homes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;}
        .home-card{border:1px solid #e2e8f0;border-radius:1rem;overflow:hidden;cursor:pointer;}
        .home-img{height:140px;background-size:cover;background-color:#eef2ff;}
        .home-info{padding:0.6rem;}
        /* jobs list */
        .job-list{display:flex;flex-direction:column;gap:0.8rem;}
        .job-item{border:1px solid #e2e8f0;border-radius:1rem;padding:0.8rem;cursor:pointer;transition:0.1s;}
        .job-item:hover{background:#fafcff;border-left:3px solid #0a66c2;}
        /* spotlight carousel */
        .sidebar-right{background:white;border-radius:1rem;border:1px solid #e2e8f0;padding:1rem;position:sticky;top:80px;}
        .spotlight-carousel{position:relative;height:200px;overflow:hidden;margin-bottom:1rem;}
        .spotlight-slide{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;transition:opacity 0.5s;background:#f8fafc;border-radius:1rem;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:1rem;cursor:pointer;}
        .spotlight-slide.active{opacity:1;}
        .spotlight-slide img{width:80px;height:80px;border-radius:12px;object-fit:cover;margin-bottom:0.5rem;}
        .action-links{margin-top:1rem;border-top:1px solid #e2e8f0;padding-top:1rem;}
        .action-item{display:flex;align-items:center;gap:0.8rem;padding:0.6rem;border-radius:0.8rem;cursor:pointer;background:#f8fafc;margin-bottom:0.5rem;}
        .toast{position:fixed;bottom:20px;right:20px;background:#1e293b;color:white;padding:0.4rem 1rem;border-radius:40px;z-index:1100;font-size:0.75rem;}
        @media (max-width:1000px){.container{grid-template-columns:1fr;}.sidebar-right{position:static;}}
        @media (max-width:768px){.navbar{padding:0.6rem 1rem;}}
    </style>
</head>
<body>
<div class="loading-bar" id="loadingBar"><div class="progress" id="loadingProgress"></div></div>
<nav class="navbar">
    <div class="logo-area"><img src="images/logo.png" alt="logo" onerror="this.src='https://placehold.co/100x30'"><span class="logo-text">kazi ni kazi</span></div>
    <div class="contact-link" id="contactBtn">contact</div>
</nav>
<div class="ticker" id="ticker"></div>
<div class="container">
    <div class="main-content">
        <div class="tabs">
            <button class="tab-btn active" data-tab="services"><i class="fas fa-briefcase"></i> Services</button>
            <button class="tab-btn" data-tab="homes"><i class="fas fa-home"></i> Homes</button>
            <button class="tab-btn" data-tab="jobs"><i class="fas fa-chart-line"></i> Jobs</button>
        </div>
        <div id="filterArea" class="filter-area"></div>
        <div id="contentArea" class="content-area"><div style="text-align:center;padding:2rem;">loading data...</div></div>
    </div>
    <div class="sidebar-right">
        <div id="spotlightContainer" class="spotlight-carousel"></div>
        <div class="action-links">
            <div class="action-item" id="becomeHostBtn"><i class="fas fa-door-open"></i> <span>become a host</span></div>
            <div class="action-item" id="postJobBtn"><i class="fas fa-plus-circle"></i> <span>post a job / profile</span></div>
        </div>
        <div class="mini-footer" style="font-size:0.65rem;text-align:center;margin-top:1rem;">© 2026 kazi — intelligent marketplace</div>
    </div>
</div>
<script>
    // ---------- GLOBALS ----------
    let db, collectionFn, getDocsFn, queryFn, whereFn, docFn, getDocFn;
    let currentTab = "services";
    let allFreelancers = [], allHomes = [], allJobs = [];
    // algorithm storage (localStorage)
    let userProfile = JSON.parse(localStorage.getItem('knk_algorithm_profile')) || {
        categoryClicks: {},   // { category: count }
        searchTerms: [],
        filterSelections: {},
        viewedIds: [],
        pricePreferences: { min: null, max: null },
        locationPreferences: {},
        totalInteractions: 0
    };
    function saveProfile() { localStorage.setItem('knk_algorithm_profile', JSON.stringify(userProfile)); }
    function trackCategory(cat) { userProfile.categoryClicks[cat] = (userProfile.categoryClicks[cat]||0)+1; userProfile.totalInteractions++; saveProfile(); }
    function trackSearch(term) { if(term){ userProfile.searchTerms.unshift(term); if(userProfile.searchTerms.length>20) userProfile.searchTerms.pop(); saveProfile(); } }
    function trackFilter(key, value) { userProfile.filterSelections[key]=value; saveProfile(); }
    function trackView(type, id) { userProfile.viewedIds.unshift(`${type}:${id}`); if(userProfile.viewedIds.length>50) userProfile.viewedIds.pop(); saveProfile(); }

    // Helper
    function showToast(msg) { let t=document.createElement('div');t.className='toast';t.innerText=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}
    function escapeHtml(str){return str.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');}
    function setLoading(show){ let bar=document.getElementById('loadingBar'); let prog=document.getElementById('loadingProgress'); if(show){ bar.classList.add('active'); prog.style.width='30%'; setTimeout(()=>prog.style.width='70%',100); }else{ prog.style.width='100%'; setTimeout(()=>{ bar.classList.remove('active'); prog.style.width='0'; },300); } }

    // ----- DATA FETCH -----
    async function fetchFreelancers(){
        const usersRef = collectionFn(db, "users");
        const q = queryFn(usersRef, whereFn("user_type", "==", "worker"));
        const snap = await getDocsFn(q);
        let workers = [];
        for(const userDoc of snap.docs){
            const user = userDoc.data();
            const workerQuery = queryFn(collectionFn(db, "workers"), whereFn("user_id", "==", userDoc.id));
            const workerSnap = await getDocsFn(workerQuery);
            let workerData = {};
            if(!workerSnap.empty) workerData = workerSnap.docs[0].data();
            workers.push({
                id: userDoc.id,
                full_name: user.full_name || "Freelancer",
                avatar: user.avatar_url || "",
                primary_skill: workerData.primary_skill_name || "Professional",
                category: workerData.primary_skill_category || "general",
                rating: workerData.reputation_points ? Math.min(5, workerData.reputation_points/100) : 3.5,
                location: user.address || "Remote"
            });
        }
        return workers;
    }
    async function fetchHomes(){
        const snap = await getDocsFn(collectionFn(db, "realEstateHomes"));
        let homes = [];
        snap.forEach(d=>{
            let data=d.data();
            homes.push({
                id:d.id, title:data.title||"Property", location:data.location||"Unknown",
                price:data.price||"$0", guests:data.bedrooms?parseInt(data.bedrooms)*2:4,
                type:(data.propertyType||"house").toLowerCase(), image:(data.images&&data.images[0])||"https://placehold.co/400x200?text=Home",
                bedrooms:data.bedrooms||1, bathrooms:data.bathrooms||1, area:data.area||0
            });
        });
        return homes;
    }
    async function fetchJobs(){
        const snap = await getDocsFn(collectionFn(db, "jobs"));
        let jobs = [];
        for(const doc of snap.docs){
            let data=doc.data();
            let companyName = data.company_name || "Company";
            if(data.companyId){
                const companyDoc = await getDocFn(docFn(db, "users", data.companyId));
                if(companyDoc.exists()) companyName = companyDoc.data().company_name || companyName;
            }
            let payout = data.payout || { amount:0, currency:"USD" };
            let usdAmount = payout.currency === "RWF" ? payout.amount/1200 : payout.amount;
            jobs.push({
                id:doc.id, title:data.title||"Position", company:companyName,
                budget: `${payout.amount} ${payout.currency}`, usdAmount: usdAmount,
                location:data.location||"Remote", category:data.category||"general",
                description:data.description||"", skills:data.skills||[], type:data.remote?"remote":"onsite"
            });
        }
        return jobs;
    }

    // ----- ALGORITHM: order categories by user interest -----
    function getOrderedCategories(categories, allFreelancers){
        let catCounts = {};
        categories.forEach(c=>{ catCounts[c]=0; });
        allFreelancers.forEach(f=>{ if(f.category && catCounts[f.category]!==undefined) catCounts[f.category]++; });
        let sorted = categories.filter(c=>catCounts[c]>0);
        sorted.sort((a,b)=>{
            let scoreA = userProfile.categoryClicks[a]||0;
            let scoreB = userProfile.categoryClicks[b]||0;
            if(scoreA !== scoreB) return scoreB - scoreA;
            return catCounts[b] - catCounts[a];
        });
        if(userProfile.totalInteractions>5 && sorted.length){
            let recommended = sorted[0];
            return [recommended, ...sorted.filter(c=>c!==recommended)];
        }
        return sorted;
    }

    // ----- RENDER SERVICES (horizontal categories)-----
    function renderServices(filterState){
        let filtered = [...allFreelancers];
        if(filterState.search){
            let s=filterState.search.toLowerCase();
            filtered = filtered.filter(f=>f.full_name.toLowerCase().includes(s) || f.primary_skill.toLowerCase().includes(s));
        }
        if(filterState.category && filterState.category!="ALL"){
            filtered = filtered.filter(f=>f.category===filterState.category);
        }
        if(filterState.location){
            filtered = filtered.filter(f=>f.location.toLowerCase().includes(filterState.location.toLowerCase()));
        }
        if(filterState.rating){
            let min = parseFloat(filterState.rating);
            filtered = filtered.filter(f=>f.rating>=min);
        }
        let categories = ["Web & Software Development","Graphic & Visual Design","Writing & Content Creation","Digital Marketing & SEO",
            "Video & Audio Production","Local & Physical Services","Event Planning & Lifestyle","Education & Tutoring",
            "Administrative & Business Support","Sales & Lead Generation"];
        let ordered = getOrderedCategories(categories, filtered);
        let html = "";
        for(let cat of ordered){
            let catFreelancers = filtered.filter(f=>f.category===cat);
            if(catFreelancers.length===0) continue;
            html += `<div class="category-section"><div class="category-title"><i class="fas fa-users"></i> ${cat}</div><div class="horizontal-scroll">`;
            catFreelancers.forEach(f=>{
                let initial = f.full_name.charAt(0).toUpperCase();
                html += `<div class="freelancer-card" data-id="${f.id}" data-category="${cat}">
                            <div class="avatar">${f.avatar?`<img src="${f.avatar}">`:initial}</div>
                            <div class="name">${escapeHtml(f.full_name)}</div>
                            <div class="skill">${escapeHtml(f.primary_skill)}</div>
                            <div class="stars">${'★'.repeat(Math.floor(f.rating))}${'☆'.repeat(5-Math.floor(f.rating))} ${f.rating.toFixed(1)}</div>
                            <div style="font-size:0.65rem;">📍 ${escapeHtml(f.location)}</div>
                        </div>`;
            });
            html += `</div></div>`;
        }
        if(html==="") html = "<div style='text-align:center;padding:2rem;'>No freelancers match your filters</div>";
        document.getElementById('contentArea').innerHTML = html;
        document.querySelectorAll('.freelancer-card').forEach(card=>{
            card.addEventListener('click',()=>{
                let id = card.getAttribute('data-id');
                let cat = card.getAttribute('data-category');
                trackCategory(cat);
                trackView('freelancer',id);
                localStorage.setItem('knk_selected_freelancer',id);
                window.location.href='profile.html';
            });
        });
    }

    // ----- HOMES RENDER (grid)-----
    function renderHomes(filterState){
        let filtered = [...allHomes];
        if(filterState.search){
            let s=filterState.search.toLowerCase();
            filtered = filtered.filter(h=>h.title.toLowerCase().includes(s) || h.location.toLowerCase().includes(s));
        }
        if(filterState.location) filtered = filtered.filter(h=>h.location.toLowerCase().includes(filterState.location.toLowerCase()));
        if(filterState.type && filterState.type!="all") filtered = filtered.filter(h=>h.type===filterState.type);
        if(filterState.minPrice){
            let min = parseInt(filterState.minPrice);
            filtered = filtered.filter(h=>{ let p = parseInt(h.price.replace(/[^0-9]/g,'')); return p>=min; });
        }
        if(filterState.maxPrice){
            let max = parseInt(filterState.maxPrice);
            filtered = filtered.filter(h=>{ let p = parseInt(h.price.replace(/[^0-9]/g,'')); return p<=max; });
        }
        if(filterState.guests){
            let total = (filterState.adults||0)+(filterState.children||0)+(filterState.pets||0);
            filtered = filtered.filter(h=>h.guests>=total);
        }
        let html = `<div class="homes-grid">`;
        filtered.forEach(h=>{
            html += `<div class="home-card" data-id="${h.id}">
                        <div class="home-img" style="background-image:url('${h.image}');"></div>
                        <div class="home-info">
                            <strong>${escapeHtml(h.title)}</strong>
                            <div>📍 ${escapeHtml(h.location)}</div>
                            <div>💰 ${h.price} · 🛏️ ${h.bedrooms} 🛁 ${h.bathrooms}</div>
                        </div>
                    </div>`;
        });
        html += `</div>`;
        document.getElementById('contentArea').innerHTML = html;
        document.querySelectorAll('.home-card').forEach(c=>{
            c.addEventListener('click',()=>{
                let id = c.getAttribute('data-id');
                trackView('home',id);
                localStorage.setItem('knk_selected_home',id);
                window.location.href='home.html';
            });
        });
    }

    // ----- JOBS RENDER (list)-----
    function renderJobs(filterState){
        let filtered = [...allJobs];
        if(filterState.search){
            let s=filterState.search.toLowerCase();
            filtered = filtered.filter(j=>j.title.toLowerCase().includes(s) || j.company.toLowerCase().includes(s));
        }
        if(filterState.category && filterState.category!="ALL"){
            filtered = filtered.filter(j=>j.category===filterState.category);
        }
        if(filterState.salaryRange){
            let [min,max] = filterState.salaryRange.split('-').map(Number);
            if(max) filtered = filtered.filter(j=>j.usdAmount>=min && j.usdAmount<=max);
            else filtered = filtered.filter(j=>j.usdAmount>=min);
        }
        if(filterState.skill){
            filtered = filtered.filter(j=>j.skills.some(s=>s.toLowerCase().includes(filterState.skill.toLowerCase())));
        }
        let html = `<div class="job-list">`;
        filtered.forEach(j=>{
            html += `<div class="job-item" data-id="${j.id}">
                        <div class="job-title">${escapeHtml(j.title)}</div>
                        <div class="job-meta" style="display:flex;gap:0.8rem;font-size:0.7rem;color:#475569;">
                            <span>🏢 ${escapeHtml(j.company)}</span>
                            <span>💰 ${j.budget}</span>
                            <span>📍 ${j.location}</span>
                            <span>⚡ ${j.type}</span>
                        </div>
                        <div style="font-size:0.7rem;">${escapeHtml(j.description.substring(0,80))}…</div>
                    </div>`;
        });
        html += `</div>`;
        document.getElementById('contentArea').innerHTML = html;
        document.querySelectorAll('.job-item').forEach(item=>{
            item.addEventListener('click',()=>{
                let id = item.getAttribute('data-id');
                trackView('job',id);
                localStorage.setItem('knk_selected_job',id);
                window.location.href='job.html';
            });
        });
    }

    // ----- DYNAMIC FILTER UI BUILDERS -----
    let serviceFilters = { search:"", category:"ALL", location:"", rating:"" };
    let homeFilters = { search:"", location:"", type:"all", minPrice:"", maxPrice:"", adults:1, children:0, pets:0, guests:0 };
    let jobFilters = { search:"", category:"ALL", salaryRange:"", skill:"" };
    let currentFilterState = null;

    function buildServicesFilter(){
        let html = `<div class="filter-group"><i class="fas fa-search"></i><input type="text" id="svcSearch" placeholder="search name, skill..." value="${serviceFilters.search}"></div>
                    <div class="filter-group searchable-dropdown"><i class="fas fa-tag"></i><input type="text" id="svcCategoryInput" placeholder="category" autocomplete="off"><div id="svcCategoryList" class="dropdown-list"></div></div>
                    <div class="filter-group searchable-dropdown"><i class="fas fa-map-marker-alt"></i><input type="text" id="svcLocationInput" placeholder="district/sector" autocomplete="off"><div id="svcLocationList" class="dropdown-list"></div></div>
                    <div class="filter-group"><i class="fas fa-star"></i><select id="svcRating"><option value="">rating</option><option value="2">2+</option><option value="3">3+</option><option value="4">4+</option><option value="4.5">4.5+</option></select></div>
                    <button id="applySvc">apply</button>`;
        document.getElementById('filterArea').innerHTML = html;
        // populate categories
        const cats = ["ALL","Web & Software Development","Graphic & Visual Design","Writing & Content Creation","Digital Marketing & SEO","Video & Audio Production","Local & Physical Services","Event Planning & Lifestyle","Education & Tutoring","Administrative & Business Support","Sales & Lead Generation"];
        const locs = ["Gasabo","Kicukiro","Nyarugenge","Bugesera","Gatsibo","Kayonza","Kirehe","Ngoma","Nyagatare","Rwamagana","Burera","Gakenke","Gicumbi","Musanze","Rulindo","Gisagara","Huye","Kamonyi","Muhanga","Nyamagabe","Nyanza","Nyaruguru","Ruhango","Karongi","Ngororero","Nyabihu","Nyamasheke","Rubavu","Rusizi","Rutsiro"];
        let catInput = document.getElementById('svcCategoryInput');
        let catList = document.getElementById('svcCategoryList');
        catInput.addEventListener('input',(e)=>{
            let val = e.target.value.toLowerCase();
            let filtered = cats.filter(c=>c.toLowerCase().includes(val));
            catList.innerHTML = filtered.map(c=>`<div class="dropdown-item" data-value="${c}">${c}</div>`).join('');
            catList.classList.add('show');
            document.querySelectorAll('#svcCategoryList .dropdown-item').forEach(el=>{
                el.addEventListener('click',()=>{ catInput.value=el.getAttribute('data-value'); serviceFilters.category=el.getAttribute('data-value'); catList.classList.remove('show'); });
            });
        });
        let locInput = document.getElementById('svcLocationInput');
        let locList = document.getElementById('svcLocationList');
        locInput.addEventListener('input',(e)=>{
            let val = e.target.value.toLowerCase();
            let filtered = locs.filter(l=>l.toLowerCase().includes(val));
            locList.innerHTML = filtered.map(l=>`<div class="dropdown-item" data-value="${l}">${l}</div>`).join('');
            locList.classList.add('show');
            document.querySelectorAll('#svcLocationList .dropdown-item').forEach(el=>{
                el.addEventListener('click',()=>{ locInput.value=el.getAttribute('data-value'); serviceFilters.location=el.getAttribute('data-value'); locList.classList.remove('show'); });
            });
        });
        document.getElementById('applySvc').addEventListener('click',()=>{
            serviceFilters.search = document.getElementById('svcSearch').value.toLowerCase();
            serviceFilters.rating = document.getElementById('svcRating').value;
            trackSearch(serviceFilters.search);
            renderServices(serviceFilters);
        });
    }

    function buildHomesFilter(){
        let html = `<div class="filter-group"><i class="fas fa-search"></i><input type="text" id="homeSearch" placeholder="search homes..." value="${homeFilters.search}"></div>
                    <div class="filter-group searchable-dropdown"><i class="fas fa-map-marker-alt"></i><input type="text" id="homeLocationInput" placeholder="district" autocomplete="off"><div id="homeLocationList" class="dropdown-list"></div></div>
                    <div class="filter-group" style="position:relative;"><i class="fas fa-users"></i><input type="text" id="guestInput" placeholder="guests" readonly value="1 adult"><div id="guestPanel" class="guests-panel"></div></div>
                    <div class="filter-group price-range"><i class="fas fa-dollar-sign"></i><input type="number" id="minPrice" placeholder="min price" value="${homeFilters.minPrice}"><input type="number" id="maxPrice" placeholder="max price" value="${homeFilters.maxPrice}"></div>
                    <div class="filter-group"><i class="fas fa-building"></i><select id="homeType"><option value="all">all types</option><option value="apartment">apartment</option><option value="land">land</option><option value="condo">condo</option><option value="villa">villa</option><option value="house">house</option><option value="commercial">commercial</option></select></div>
                    <button id="applyHome">apply</button>`;
        document.getElementById('filterArea').innerHTML = html;
        const districts = ["Gasabo","Kicukiro","Nyarugenge","Bugesera","Gatsibo","Kayonza","Kirehe","Ngoma","Nyagatare","Rwamagana","Burera","Gakenke","Gicumbi","Musanze","Rulindo","Gisagara","Huye","Kamonyi","Muhanga","Nyamagabe","Nyanza","Nyaruguru","Ruhango","Karongi","Ngororero","Nyabihu","Nyamasheke","Rubavu","Rusizi","Rutsiro"];
        let locInput = document.getElementById('homeLocationInput');
        let locList = document.getElementById('homeLocationList');
        locInput.addEventListener('input',(e)=>{
            let val = e.target.value.toLowerCase();
            let filtered = districts.filter(d=>d.toLowerCase().includes(val));
            locList.innerHTML = filtered.map(d=>`<div class="dropdown-item" data-value="${d}">${d}</div>`).join('');
            locList.classList.add('show');
            document.querySelectorAll('#homeLocationList .dropdown-item').forEach(el=>{
                el.addEventListener('click',()=>{ locInput.value=el.getAttribute('data-value'); homeFilters.location=el.getAttribute('data-value'); locList.classList.remove('show'); });
            });
        });
        // guest panel
        let guestBtn = document.getElementById('guestInput');
        let panel = document.getElementById('guestPanel');
        let adults=homeFilters.adults, children=homeFilters.children, pets=homeFilters.pets;
        function updateGuestDisplay(){ guestBtn.value = `${adults} adult${adults!==1?'s':''} ${children?children+' child'+ (children!==1?'ren':''):''} ${pets?pets+' pet'+(pets!==1?'s':''):''}`.trim(); homeFilters.guests=adults+children+pets; }
        function renderGuestPanel(){
            panel.innerHTML = `<div class="guest-row"><span>Adults</span><div><button id="adultMinus">-</button><span id="adultCount">${adults}</span><button id="adultPlus">+</button></div></div>
                               <div class="guest-row"><span>Children</span><div><button id="childMinus">-</button><span id="childCount">${children}</span><button id="childPlus">+</button></div></div>
                               <div class="guest-row"><span>Pets</span><div><button id="petMinus">-</button><span id="petCount">${pets}</span><button id="petPlus">+</button></div></div>
                               <button id="closeGuest" style="margin-top:0.5rem;">Done</button>`;
            panel.style.display='block';
            document.getElementById('adultMinus').onclick=()=>{ if(adults>0)adults--; updateGuestDisplay(); renderGuestPanel(); };
            document.getElementById('adultPlus').onclick=()=>{ adults++; updateGuestDisplay(); renderGuestPanel(); };
            document.getElementById('childMinus').onclick=()=>{ if(children>0)children--; updateGuestDisplay(); renderGuestPanel(); };
            document.getElementById('childPlus').onclick=()=>{ children++; updateGuestDisplay(); renderGuestPanel(); };
            document.getElementById('petMinus').onclick=()=>{ if(pets>0)pets--; updateGuestDisplay(); renderGuestPanel(); };
            document.getElementById('petPlus').onclick=()=>{ pets++; updateGuestDisplay(); renderGuestPanel(); };
            document.getElementById('closeGuest').onclick=()=>{ panel.style.display='none'; homeFilters.adults=adults; homeFilters.children=children; homeFilters.pets=pets; homeFilters.guests=adults+children+pets; };
        }
        guestBtn.addEventListener('click',renderGuestPanel);
        document.addEventListener('click',(e)=>{ if(!panel.contains(e.target) && e.target!==guestBtn) panel.style.display='none'; });
        document.getElementById('applyHome').addEventListener('click',()=>{
            homeFilters.search = document.getElementById('homeSearch').value.toLowerCase();
            homeFilters.type = document.getElementById('homeType').value;
            homeFilters.minPrice = document.getElementById('minPrice').value;
            homeFilters.maxPrice = document.getElementById('maxPrice').value;
            trackFilter('home_price',`${homeFilters.minPrice}-${homeFilters.maxPrice}`);
            renderHomes(homeFilters);
        });
        updateGuestDisplay();
    }

    function buildJobsFilter(){
        let html = `<div class="filter-group"><i class="fas fa-search"></i><input type="text" id="jobSearch" placeholder="search jobs..." value="${jobFilters.search}"></div>
                    <div class="filter-group searchable-dropdown"><i class="fas fa-tag"></i><input type="text" id="jobCategoryInput" placeholder="category" autocomplete="off"><div id="jobCategoryList" class="dropdown-list"></div></div>
                    <div class="filter-group"><i class="fas fa-dollar-sign"></i><select id="salaryRange"><option value="">salary</option><option value="5-25">$5-$25</option><option value="30-50">$30-$50</option><option value="60-120">$60-$120</option><option value="130-300">$130-$300</option><option value="400-800">$400-$800</option><option value="1000-10000">$1000+</option></select></div>
                    <div class="filter-group searchable-dropdown"><i class="fas fa-code"></i><input type="text" id="skillInput" placeholder="skill" autocomplete="off"><div id="skillList" class="dropdown-list"></div></div>
                    <button id="applyJob">apply</button>`;
        document.getElementById('filterArea').innerHTML = html;
        const categories = ["ALL","Web & Software Development","Graphic & Visual Design","Writing & Content Creation","Digital Marketing & SEO","Video & Audio Production","Local & Physical Services","Event Planning & Lifestyle","Education & Tutoring","Administrative & Business Support","Sales & Lead Generation"];
        let catInput = document.getElementById('jobCategoryInput');
        let catList = document.getElementById('jobCategoryList');
        catInput.addEventListener('input',(e)=>{
            let val=e.target.value.toLowerCase();
            let filtered = categories.filter(c=>c.toLowerCase().includes(val));
            catList.innerHTML = filtered.map(c=>`<div class="dropdown-item" data-value="${c}">${c}</div>`).join('');
            catList.classList.add('show');
            document.querySelectorAll('#jobCategoryList .dropdown-item').forEach(el=>{
                el.addEventListener('click',()=>{ catInput.value=el.getAttribute('data-value'); jobFilters.category=el.getAttribute('data-value'); catList.classList.remove('show'); });
            });
        });
        // skills dynamic
        const allSkills = {
            "Web & Software Development":["Frontend Developer","Backend Developer","Full-Stack Developer","Mobile App Developer","WordPress Developer","Software Engineer","Game Developer"],
            "Graphic & Visual Design":["Graphic Designer","Logo Designer","Branding Designer","Illustrator","UI/UX Designer","Motion Graphics Designer","Animator"],
            "Writing & Content Creation":["Copywriter","Blog Writer","Technical Writer","Scriptwriter","Translator","Proofreader/Editor","Social Media Content Creator"],
            "Digital Marketing & SEO":["Social Media Manager","SEO Specialist","Digital Advertiser","Email Marketing Specialist","Content Marketing Strategist","Influencer Marketing Manager"],
            "Video & Audio Production":["Video Editor","Videographer","Animator","Sound Engineer","Voice-over Artist","Podcast Producer","Video Producer"],
            "Local & Physical Services":["Electrician","Plumber","Carpenter","Painter","Mason","Mechanic","House Cleaner"],
            "Event Planning & Lifestyle":["Event Planner","Wedding Planner","DJ","MC","Photographer","Makeup Artist","Decorator"],
            "Education & Tutoring":["Private Tutor","Coding Instructor","Music Teacher","Online Course Creator","Language Teacher","Test Prep Coach"],
            "Administrative & Business Support":["Virtual Assistant","Data Entry Clerk","Accountant","HR Assistant","Customer Support","Project Manager"],
            "Sales & Lead Generation":["Sales Representative","Lead Generation Specialist","Market Research Analyst","Telemarketer","Business Development"]
        };
        let skillInput = document.getElementById('skillInput');
        let skillList = document.getElementById('skillList');
        function updateSkillOptions(){
            let cat = jobFilters.category;
            let skills = cat !== "ALL" && allSkills[cat] ? allSkills[cat] : Object.values(allSkills).flat();
            skillInput.addEventListener('input',(e)=>{
                let val=e.target.value.toLowerCase();
                let filtered = skills.filter(s=>s.toLowerCase().includes(val));
                skillList.innerHTML = filtered.map(s=>`<div class="dropdown-item" data-value="${s}">${s}</div>`).join('');
                skillList.classList.add('show');
                document.querySelectorAll('#skillList .dropdown-item').forEach(el=>{
                    el.addEventListener('click',()=>{ skillInput.value=el.getAttribute('data-value'); jobFilters.skill=el.getAttribute('data-value'); skillList.classList.remove('show'); });
                });
            });
        }
        catInput.addEventListener('change',()=>{ updateSkillOptions(); });
        updateSkillOptions();
        document.getElementById('applyJob').addEventListener('click',()=>{
            jobFilters.search = document.getElementById('jobSearch').value.toLowerCase();
            jobFilters.salaryRange = document.getElementById('salaryRange').value;
            renderJobs(jobFilters);
        });
    }

    async function loadAllData(){
        setLoading(true);
        try{
            [allFreelancers, allHomes, allJobs] = await Promise.all([fetchFreelancers(), fetchHomes(), fetchJobs()]);
        }catch(e){ console.error(e); showToast("Error loading data"); }
        setLoading(false);
        if(currentTab==="services"){ buildServicesFilter(); renderServices(serviceFilters); }
        else if(currentTab==="homes"){ buildHomesFilter(); renderHomes(homeFilters); }
        else{ buildJobsFilter(); renderJobs(jobFilters); }
    }

    // ----- SPOTLIGHT CAROUSEL (admin editable via localStorage)-----
    let spotlightItems = JSON.parse(localStorage.getItem('knk_spotlight_items')) || [
        { image:"https://placehold.co/200x200/0a66c2/white?text=Welcome", description:"trusted freelancers, homes & jobs — 2026 edition", link:"#" },
        { image:"https://placehold.co/200x200/eab308/white?text=Verified", description:"verified badge → higher trust & visibility", link:"#" },
        { image:"https://placehold.co/200x200/10b981/white?text=Promote", description:"reach 12k+ active clients · featured listing", link:"#" }
    ];
    let currentSlide=0, slideInterval;
    function renderSpotlight(){
        let container = document.getElementById('spotlightContainer');
        container.innerHTML = spotlightItems.map((item,idx)=>`
            <div class="spotlight-slide ${idx===0?'active':''}" data-link="${item.link}">
                <img src="${item.image}" alt="spot">
                <p style="font-size:0.75rem;">${escapeHtml(item.description)}</p>
            </div>
        `).join('');
        let slides = document.querySelectorAll('.spotlight-slide');
        slides.forEach((s,i)=>s.addEventListener('click',()=>{ let link=s.getAttribute('data-link'); if(link && link!='#') window.open(link,'_blank'); else showToast("spotlight link not set"); }));
        if(slideInterval) clearInterval(slideInterval);
        slideInterval = setInterval(()=>{
            let slidesArr = document.querySelectorAll('.spotlight-slide');
            if(slidesArr.length===0) return;
            slidesArr[currentSlide].classList.remove('active');
            currentSlide = (currentSlide+1)%slidesArr.length;
            slidesArr[currentSlide].classList.add('active');
        },8000);
    }

    // ----- TICKER ADMIN (localStorage)-----
    let tickerMessages = JSON.parse(localStorage.getItem('knk_ticker_messages')) || [
        "2026 updates · verified freelancers · new remote jobs added daily",
        "book homes with instant confirmation",
        "verification drive — boost your profile"
    ];
    function renderTicker(){
        let tickerDiv = document.getElementById('ticker');
        tickerDiv.innerHTML = `<div class="ticker-content"><i class="fas fa-circle-info"></i> ${tickerMessages.join(' <i class="fas fa-circle"></i> ')}</div>`;
    }

    // ----- INIT -----
    window.addEventListener('load',async()=>{
        let attempts=0;
        while(!window.__db && attempts<30){ await new Promise(r=>setTimeout(r,100)); attempts++; }
        if(!window.__db){ showToast("Firebase not loaded"); return; }
        db = window.__db; collectionFn = window.__collection; getDocsFn = window.__getDocs; queryFn = window.__query; whereFn = window.__where; docFn = window.__doc; getDocFn = window.__getDoc;
        renderTicker();
        renderSpotlight();
        document.querySelectorAll('.tab-btn').forEach(btn=>{
            btn.addEventListener('click',()=>{
                document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.getAttribute('data-tab');
                if(currentTab==="services") buildServicesFilter(), renderServices(serviceFilters);
                else if(currentTab==="homes") buildHomesFilter(), renderHomes(homeFilters);
                else buildJobsFilter(), renderJobs(jobFilters);
            });
        });
        document.getElementById('contactBtn').addEventListener('click',()=>window.location.href='contactus.html');
        document.getElementById('becomeHostBtn').addEventListener('click',()=>window.location.href='settingsho.html');
        document.getElementById('postJobBtn').addEventListener('click',()=>window.location.href='auth.html');
        await loadAllData();
    });
</script>
