<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Kazi ni Kazi · Sign In or Join</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#f4f2ef;color:#191919;min-height:100vh;display:flex;flex-direction:column;}
        .navbar{background:white;border-bottom:1px solid #e2e8f0;padding:clamp(0.6rem,3vw,1rem) clamp(1rem,5vw,2.5rem);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;position:sticky;top:0;z-index:100;}
        .logo-area{display:flex;align-items:center;gap:0.75rem;}
        .logo-area img{height:clamp(36px,6vw,44px);width:auto;object-fit:contain;}
        .logo-text{font-size:clamp(1.2rem,5vw,1.6rem);font-weight:800;background:linear-gradient(135deg,#0a66c2,#00a3ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .nav-buttons{display:flex;gap:clamp(0.5rem,3vw,1rem);}
        .btn-outline-nav,.btn-primary-nav{padding:clamp(0.4rem,1.5vw,0.6rem) clamp(1rem,3vw,1.5rem);border-radius:40px;font-weight:600;font-size:clamp(0.8rem,3vw,0.9rem);cursor:pointer;transition:all 0.2s;border:none;}
        .btn-outline-nav{background:transparent;border:1px solid #0a66c2;color:#0a66c2;}
        .btn-outline-nav:hover{background:rgba(10,102,194,0.05);transform:translateY(-1px);}
        .btn-primary-nav{background:#0a66c2;color:white;}
        .btn-primary-nav:hover{background:#004182;transform:translateY(-1px);}
        .container{max-width:700px;width:92%;margin:clamp(1rem,5vw,2.5rem) auto;flex:1;}
        .card{background:white;border-radius:clamp(1rem,4vw,1.5rem);border:1px solid #eef2f8;padding:clamp(1.2rem,5vw,2rem);box-shadow:0 8px 24px rgba(0,0,0,0.04);}
        .card h2{font-size:clamp(1.3rem,6vw,1.8rem);font-weight:700;margin-bottom:0.25rem;}
        .card-sub{color:#5e6f8d;font-size:clamp(0.75rem,3.5vw,0.85rem);border-bottom:1px solid #eef2f8;padding-bottom:0.8rem;margin-bottom:1.2rem;}
        .form-group{margin-bottom:clamp(0.9rem,4vw,1.2rem);}
        label{font-size:clamp(0.7rem,3vw,0.8rem);font-weight:600;display:block;margin-bottom:0.35rem;color:#1e293b;}
        input,select{width:100%;padding:clamp(0.6rem,2.5vw,0.8rem) clamp(0.7rem,3vw,1rem);border:1.5px solid #e2e8f0;border-radius:12px;font-size:clamp(0.85rem,3.5vw,0.95rem);font-family:inherit;background:white;}
        input:focus,select:focus{outline:none;border-color:#0a66c2;box-shadow:0 0 0 3px rgba(10,102,194,0.1);}
        .inline-row{display:flex;gap:clamp(0.6rem,3vw,1rem);flex-wrap:wrap;}
        .inline-row .form-group{flex:1;min-width:140px;}
        .submit-btn{width:100%;background:#0a66c2;color:white;border:none;padding:clamp(0.7rem,3vw,0.9rem);border-radius:40px;font-weight:700;font-size:clamp(0.9rem,4vw,1rem);cursor:pointer;transition:all 0.2s;margin-top:0.5rem;}
        .submit-btn:hover:not(:disabled){background:#004182;transform:translateY(-2px);box-shadow:0 6px 14px rgba(10,102,194,0.25);}
        .submit-btn:disabled{opacity:0.65;cursor:not-allowed;}
        .back-btn{background:transparent;border:1px solid #cbd5e1;color:#334155;padding:clamp(0.4rem,2vw,0.6rem) clamp(0.8rem,3vw,1.2rem);border-radius:40px;font-size:clamp(0.75rem,3vw,0.85rem);cursor:pointer;margin-bottom:1.2rem;display:inline-flex;align-items:center;gap:0.5rem;}
        .type-toggle-group{display:flex;gap:0.8rem;margin-bottom:1.8rem;flex-wrap:wrap;}
        .type-toggle-btn{flex:1;text-align:center;padding:clamp(0.6rem,2.5vw,0.8rem);border-radius:60px;font-weight:700;font-size:clamp(0.85rem,3.5vw,1rem);cursor:pointer;background:#f1f5f9;color:#334155;border:none;transition:all 0.2s;}
        .type-toggle-btn.active{background:#0a66c2;color:white;box-shadow:0 2px 8px rgba(10,102,194,0.3);}
        .upload-btn{background:#f8fafc;border:1.5px dashed #0a66c2;padding:clamp(0.5rem,2.5vw,0.7rem) clamp(0.8rem,3vw,1.2rem);border-radius:40px;font-size:clamp(0.7rem,3vw,0.8rem);cursor:pointer;display:inline-flex;align-items:center;gap:0.5rem;}
        .circle-preview{width:clamp(70px,15vw,90px);height:clamp(70px,15vw,90px);border-radius:50%;object-fit:cover;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        .rect-preview{width:clamp(70px,12vw,90px);height:clamp(55px,10vw,70px);object-fit:cover;border-radius:12px;border:1px solid #e2e8f0;}
        .images-preview{display:flex;gap:0.6rem;flex-wrap:wrap;margin-top:0.8rem;align-items:center;}
        .skill-card{background:#f8fafc;border-radius:12px;padding:0.8rem;margin-bottom:0.8rem;border:1px solid #e2e8f0;}
        .skill-header{display:flex;gap:0.6rem;align-items:center;flex-wrap:wrap;}
        .skill-header select{flex:2;min-width:120px;}
        .skill-header .skill-level{flex:1;min-width:100px;}
        .remove-skill-btn{background:#fee2e2;border:none;padding:0.4rem 0.8rem;border-radius:30px;color:#dc2626;cursor:pointer;font-size:0.7rem;}
        .add-skill-btn{background:#eef2ff;border:none;padding:0.5rem 1rem;border-radius:40px;font-weight:600;cursor:pointer;margin-top:0.5rem;}
        .category-search{position:relative;}
        .category-list{position:absolute;top:100%;left:0;right:0;background:white;border:1px solid #cbd5e1;border-radius:16px;max-height:220px;overflow-y:auto;z-index:30;display:none;box-shadow:0 8px 20px rgba(0,0,0,0.1);}
        .category-list.show{display:block;}
        .category-item{padding:0.7rem 1rem;cursor:pointer;font-size:clamp(0.8rem,3vw,0.85rem);}
        .category-item:hover{background:#eef3fc;}
        .selected-cat{background:#e0edff;padding:0.3rem 0.9rem;border-radius:40px;font-size:clamp(0.7rem,3vw,0.8rem);display:inline-block;margin-top:0.5rem;}
        .toast{position:fixed;bottom:20px;right:20px;background:#1f2937;color:white;padding:0.8rem 1.5rem;border-radius:60px;font-size:0.85rem;z-index:1100;animation:slideUp 0.25s ease;max-width:90vw;}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
        .loader{display:inline-block;width:18px;height:18px;border:2px solid white;border-radius:50%;border-top-color:transparent;animation:spin 0.6s linear infinite;margin-right:8px;vertical-align:middle;}
        @keyframes spin{to{transform:rotate(360deg);}}
        footer{text-align:center;padding:clamp(1rem,4vw,1.5rem);font-size:clamp(0.65rem,3vw,0.75rem);color:#64748b;border-top:1px solid #e2e8f0;margin-top:auto;}
        @media(max-width:550px){.container{width:95%;}.inline-row{flex-direction:column;gap:0.8rem;}.navbar{flex-direction:column;align-items:stretch;}}
    </style>
</head>

<script>
    // ==================== SUPABASE CONFIGURATION ====================
    const SUPABASE_URL = 'https://bzbneptssprgnsrjqfsm.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_SYsRbYQOnrYW6cAtIAHpDg_uLV2G_k2';
    const IMGBB_API_KEY = 'ba8023ca74166460c442e8e703d2a1b0';
    
    let _supabase = null;
    
    function initSupabase() {
        if (typeof supabase !== 'undefined' && !_supabase) {
            _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } else if (window.supabase && !_supabase) {
            _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } else {
            console.error('Supabase not loaded');
        }
    }
    
    // ---------- APP STATE ----------
    let _currentView = 'signin';
    let _accountType = 'company';
    let _selectedCategory = '';
    let _generalSkills = [];
    let _selectedPrimarySkill = '';
    let _businessImages = [];
    let _companyLogoBase64 = '';
    let _workerAvatarBase64 = '';
    
    // Categories & Skills DB
    const _categories = ["Food & Hospitality","Retail & Shops","Construction","Real Estate","Technology & IT Services","Digital Agencies","Marketing & Advertising","Events & Entertainment","Transportation & Logistics","Delivery Services","Health & Medical Services","Pharmacies","Fitness & Gyms","Beauty & Personal Care","Education & Training","Financial Services","Insurance","Legal Services","Agriculture & Farming","Manufacturing","Wholesale & Distribution","Cleaning Services","Repair & Maintenance","Security Services","Printing & Publishing","Media & Broadcasting","Travel & Tourism","Non-Profit Organizations","Government & Public Services","Consulting & Business Services"];
    
    const _skillsDB = {
        "Web & Software Development":["Frontend Developer","Backend Developer","Full-Stack Developer","Mobile App Developer","WordPress Developer","Software Engineer","Game Developer"],
        "Graphic & Visual Design":["Graphic Designer","Logo Designer","Branding Designer","Illustrator","UI/UX Designer","Motion Graphics Designer","Animator"],
        "Writing & Content Creation":["Copywriter","Blog Writer","Technical Writer","Scriptwriter","Translator","Proofreader/Editor","Social Media Content Creator"],
        "Digital Marketing & SEO":["Social Media Manager","SEO Specialist","Digital Advertiser","Email Marketing Specialist","Content Marketing Strategist","Influencer Marketing Manager"],
        "Video & Audio Production":["Video Editor","Videographer","Animator","Sound Engineer","Voice-over Artist","Podcast Producer","Video Producer"],
        "Local & Physical Services":["Electrician","Plumber","Carpenter","Painter","Mason","Mechanic","House Cleaner"],
        "Salon, Beauty & Personal Care":["Hair Stylist","Barber","Makeup Artist","Nail Technician","Esthetician","Massage Therapist","Spa Therapist"],
        "Event Planning & Lifestyle":["Event Planner","Wedding Planner","DJ","MC","Photographer","Decorator","Florist"],
        "Education & Tutoring":["Private Tutor","Coding Instructor","Music Teacher","Online Course Creator","Language Teacher","Test Prep Coach"],
        "Administrative & Business Support":["Virtual Assistant","Data Entry Clerk","Accountant","HR Assistant","Customer Support","Project Manager"],
        "Sales & Lead Generation":["Sales Representative","Lead Generation Specialist","Market Research Analyst","Telemarketer","Business Development"]
    };
    
    const _skillLevels = ["Beginner", "Median", "Intermediate", "Professional"];
    
    // Helper: upload image to ImgBB (FIXED: strip base64 prefix)
    async function uploadToImgBB(base64Image) {
        try {
            if (!base64Image) throw new Error("No image data");
            // Remove the data:image/...;base64, prefix
            let rawBase64 = base64Image;
            if (base64Image.includes(',')) {
                rawBase64 = base64Image.split(',')[1];
            }
            if (!rawBase64) throw new Error("Invalid base64 string");
            
            const formData = new FormData();
            formData.append('image', rawBase64);
            formData.append('key', IMGBB_API_KEY);
            const response = await fetch('https://api.imgbb.com/1/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (data.success) {
                return data.data.url;
            } else {
                throw new Error(data.error?.message || 'Upload failed');
            }
        } catch (error) {
            console.error('ImgBB upload error:', error);
            throw error;
        }
    }
    
    function showToast(msg, isErr=false){
        let t=document.createElement('div');
        t.className='toast';
        t.style.background=isErr ? '#dc2626' : '#1f2937';
        t.innerText=msg;
        document.body.appendChild(t);
        setTimeout(()=>t.remove(), 3000);
    }
    
    function setLoading(btn, loading, originalText){
        if(!btn) return;
        if(loading){
            btn.disabled=true;
            btn.innerHTML=`<span class="loader"></span> Processing...`;
        } else {
            btn.disabled=false;
            btn.innerHTML=originalText || 'Submit';
        }
    }
    
    function toBase64(file){
        return new Promise((resolve,reject)=>{
            const reader=new FileReader();
            reader.onload=()=>resolve(reader.result);
            reader.onerror=reject;
            reader.readAsDataURL(file);
        });
    }
    
    // Render UI
    function render(){
        const container=document.getElementById('mainContainer');
        if(!container) return;
        if(_currentView === 'signin'){
            container.innerHTML=`
                <div class="card">
                    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Back</button>
                    <h2>Sign in</h2>
                    <div class="card-sub">Access your professional network</div>
                    <form id="signinFormElem">
                        <div class="form-group"><label>Email</label><input type="email" id="siEmail" placeholder="hello@kazinikazi.com" autocomplete="email"></div>
                        <div class="form-group"><label>Password</label><input type="password" id="siPassword" placeholder="••••••" autocomplete="current-password"></div>
                        <button type="submit" class="submit-btn" id="signinBtn">Sign in →</button>
                    </form>
                    <p style="font-size:0.75rem; text-align:center; margin-top:1rem;">No account? <span id="switchInline" style="color:#0a66c2; cursor:pointer; font-weight:600;">Join now</span></p>
                </div>
            `;
            document.getElementById('signinFormElem')?.addEventListener('submit', handleSignin);
            document.getElementById('switchInline')?.addEventListener('click',()=>{_currentView='signup'; resetState(); render();});
            document.getElementById('backBtn')?.addEventListener('click',()=>window.history.back());
        } else {
            container.innerHTML=`
                <div class="card">
                    <button class="back-btn" id="backBtnSignup"><i class="fas fa-arrow-left"></i> Back</button>
                    <h2>Create account</h2>
                    <div class="card-sub">Join the Kazi ni Kazi community</div>
                    <div class="type-toggle-group">
                        <button type="button" class="type-toggle-btn ${_accountType==='company'?'active':''}" id="toggleCompany">🏢 Company</button>
                        <button type="button" class="type-toggle-btn ${_accountType==='worker'?'active':''}" id="toggleWorker">👤 Freelancer</button>
                    </div>
                    <div id="signupDynamicFields"></div>
                    <form id="signupFormElem"><button type="submit" class="submit-btn" id="signupSubmitBtn">Agree & Join →</button></form>
                </div>
            `;
            document.getElementById('toggleCompany')?.addEventListener('click',()=>{_accountType='company'; resetState(); render();});
            document.getElementById('toggleWorker')?.addEventListener('click',()=>{_accountType='worker'; resetState(); render();});
            document.getElementById('backBtnSignup')?.addEventListener('click',()=>window.history.back());
            renderSignupFields();
            document.getElementById('signupFormElem')?.addEventListener('submit', handleSignup);
        }
    }
    
    function resetState(){
        _selectedCategory='';
        _generalSkills=[];
        _selectedPrimarySkill='';
        _businessImages=[];
        _companyLogoBase64='';
        _workerAvatarBase64='';
    }
    
    function renderSignupFields(){
        const container=document.getElementById('signupDynamicFields');
        if(!container) return;
        if(_accountType==='company'){
            container.innerHTML=`
                <div class="form-group"><label>Company Logo</label><input type="file" id="compLogoFile" accept="image/*" style="display:none;"><button type="button" class="upload-btn" id="uploadLogoBtn"><i class="fas fa-cloud-upload-alt"></i> Upload Logo</button><div id="logoPreviewCircle" class="images-preview"></div></div>
                <div class="form-group"><label>Company Name *</label><input type="text" id="compName" placeholder="Tech Corp Ltd"></div>
                <div class="form-group"><label>Website</label><input type="url" id="compWeb" placeholder="https://example.com"></div>
                <div class="form-group"><label>CEO / Social Name</label><input type="text" id="compCeo" placeholder="Full name"></div>
                <div class="form-group"><label>Category *</label><div class="category-search"><input type="text" id="catSearch" placeholder="Search category..."><div id="catDropdown" class="category-list"></div></div><div id="selectedCatDisplay"></div></div>
                <div class="form-group"><label>Phone</label><input type="tel" id="compPhone"></div>
                <div class="form-group"><label>Address (Province, Sector, Cell)</label><input type="text" id="compAddr" placeholder="Kigali, Gasabo, Kimihurura"></div>
                <div class="form-group"><label>Email *</label><input type="email" id="compEmail"></div>
                <div class="form-group"><label>Business images (min 3) *</label><input type="file" id="businessImgs" multiple accept="image/*" style="display:none;"><button type="button" class="upload-btn" id="uploadBizBtn"><i class="fas fa-images"></i> Select Images</button><div id="bizImagesPreview" class="images-preview"></div></div>
                <div class="form-group"><label>Password * (min 6 chars)</label><input type="password" id="compPass"></div>
            `;
            attachCompanyEvents();
        } else {
            container.innerHTML=`
                <div class="form-group"><label>Profile picture</label><input type="file" id="workerPicFile" accept="image/*" style="display:none;"><button type="button" class="upload-btn" id="uploadWorkerPicBtn"><i class="fas fa-user-circle"></i> Upload photo</button><div id="workerPreviewCircle" class="images-preview"></div></div>
                <div class="inline-row"><div class="form-group"><label>Full Names *</label><input type="text" id="workerNames"></div><div class="form-group"><label>Username</label><input type="text" id="workerUser"></div></div>
                <div class="form-group"><label>Portfolio (URL)</label><input type="url" id="workerPort" placeholder="https://portfolio.com"></div>
                <div class="form-group"><label>Primary Skill *</label><select id="priSkillCat"><option value="">-- Select Category --</option>${Object.keys(_skillsDB).map(c=>`<option value="${c}">${c}</option>`).join('')}</select><select id="priSkillSelect" disabled><option>First choose category</option></select></div>
                <div class="form-group"><label>General Skills (with levels)</label><div id="generalSkillsList"></div><button type="button" class="add-skill-btn" id="addGeneralSkillBtn"><i class="fas fa-plus"></i> Add General Skill</button></div>
                <div class="form-group"><label>Address (Province, Sector, Cell)</label><input type="text" id="workerAddr"></div>
                <div class="form-group"><label>Email *</label><input type="email" id="workerEmail"></div>
                <div class="form-group"><label>Earning range</label><select id="earningRange"><option>10$-30$</option><option>40$-80$</option><option>100$-350$</option><option>400$-700$</option><option>800$-1000$</option><option>1000$+</option></select></div>
                <div class="form-group"><label>Password * (min 6 chars)</label><input type="password" id="workerPass"></div>
            `;
            attachWorkerEvents();
            renderGeneralSkillsList();
        }
    }
    
    function renderGeneralSkillsList(){
        const container=document.getElementById('generalSkillsList');
        if(!container) return;
        if(_generalSkills.length===0){
            container.innerHTML='<p style="font-size:0.75rem; color:#64748b; padding:0.5rem;">No general skills added yet. Click "Add General Skill"</p>';
            return;
        }
        container.innerHTML=_generalSkills.map((skill,idx)=>`
            <div class="skill-card">
                <div class="skill-header">
                    <select data-skill-cat="${idx}" class="skill-category" style="flex:2;">
                        <option value="">-- Category --</option>
                        ${Object.keys(_skillsDB).map(c=>`<option value="${c}" ${skill.category===c?'selected':''}>${c}</option>`).join('')}
                    </select>
                    <select data-skill-name="${idx}" class="skill-name" style="flex:2;" ${!skill.category?'disabled':''}>
                        <option value="">Select skill</option>
                        ${skill.category && _skillsDB[skill.category] ? _skillsDB[skill.category].map(s=>`<option value="${s}" ${skill.skill===s?'selected':''}>${s}</option>`).join('') : ''}
                    </select>
                    <select data-skill-level="${idx}" class="skill-level" style="flex:1;">
                        ${_skillLevels.map(l=>`<option value="${l}" ${skill.level===l?'selected':''}>${l}</option>`).join('')}
                    </select>
                    <button type="button" class="remove-skill-btn" data-skill-remove="${idx}"><i class="fas fa-trash"></i> Remove</button>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.skill-category').forEach(sel=>{
            sel.addEventListener('change',(e)=>{
                const idx=parseInt(sel.getAttribute('data-skill-cat'));
                const newCat=e.target.value;
                _generalSkills[idx].category=newCat;
                _generalSkills[idx].skill='';
                renderGeneralSkillsList();
            });
        });
        document.querySelectorAll('.skill-name').forEach(sel=>{
            sel.addEventListener('change',(e)=>{
                const idx=parseInt(sel.getAttribute('data-skill-name'));
                _generalSkills[idx].skill=e.target.value;
            });
        });
        document.querySelectorAll('.skill-level').forEach(sel=>{
            sel.addEventListener('change',(e)=>{
                const idx=parseInt(sel.getAttribute('data-skill-level'));
                _generalSkills[idx].level=e.target.value;
            });
        });
        document.querySelectorAll('.remove-skill-btn').forEach(btn=>{
            btn.addEventListener('click',(e)=>{
                const idx=parseInt(btn.getAttribute('data-skill-remove'));
                _generalSkills.splice(idx,1);
                renderGeneralSkillsList();
            });
        });
    }
    
    function attachCompanyEvents(){
        const logoInput=document.getElementById('compLogoFile');
        document.getElementById('uploadLogoBtn')?.addEventListener('click',()=>logoInput?.click());
        logoInput?.addEventListener('change',async(e)=>{
            if(e.target.files[0]){_companyLogoBase64=await toBase64(e.target.files[0]);document.getElementById('logoPreviewCircle').innerHTML=`<img src="${_companyLogoBase64}" class="circle-preview">`;}
        });
        const bizInput=document.getElementById('businessImgs');
        document.getElementById('uploadBizBtn')?.addEventListener('click',()=>bizInput?.click());
        bizInput?.addEventListener('change',async(e)=>{
            const files=Array.from(e.target.files);
            _businessImages=[];
            const previewDiv=document.getElementById('bizImagesPreview');
            previewDiv.innerHTML='';
            for(let f of files){
                const b64=await toBase64(f);
                _businessImages.push(b64);
                let img=document.createElement('img');
                img.src=b64;
                img.className='rect-preview';
                previewDiv.appendChild(img);
            }
            if(_businessImages.length<3) showToast("Please select at least 3 business images",true);
        });
        const catInput=document.getElementById('catSearch');
        const dropdown=document.getElementById('catDropdown');
        const renderDropdown=(filter='')=>{
            const filtered=_categories.filter(c=>c.toLowerCase().includes(filter.toLowerCase()));
            dropdown.innerHTML=filtered.map(c=>`<div class="category-item" data-cat="${c}">${c}</div>`).join('');
            dropdown.classList.add('show');
            document.querySelectorAll('.category-item').forEach(el=>{
                el.addEventListener('click',()=>{
                    _selectedCategory=el.getAttribute('data-cat');
                    catInput.value=_selectedCategory;
                    document.getElementById('selectedCatDisplay').innerHTML=`<span class="selected-cat">✅ ${_selectedCategory}</span>`;
                    dropdown.classList.remove('show');
                });
            });
        };
        catInput?.addEventListener('input',(e)=>renderDropdown(e.target.value));
        catInput?.addEventListener('focus',()=>renderDropdown(catInput.value));
        document.addEventListener('click',(e)=>{if(!catInput?.contains(e.target) && dropdown && !dropdown.contains(e.target)) dropdown.classList.remove('show');});
    }
    
    function attachWorkerEvents(){
        const picInput=document.getElementById('workerPicFile');
        document.getElementById('uploadWorkerPicBtn')?.addEventListener('click',()=>picInput?.click());
        picInput?.addEventListener('change',async(e)=>{
            if(e.target.files[0]){_workerAvatarBase64=await toBase64(e.target.files[0]);document.getElementById('workerPreviewCircle').innerHTML=`<img src="${_workerAvatarBase64}" class="circle-preview">`;}
        });
        const catSel=document.getElementById('priSkillCat');
        const skillSel=document.getElementById('priSkillSelect');
        catSel?.addEventListener('change',(e)=>{
            const cat=e.target.value;
            if(cat && _skillsDB[cat]){
                skillSel.disabled=false;
                skillSel.innerHTML=`<option value="">Select primary skill</option>`+_skillsDB[cat].map(s=>`<option value="${s}">${s}</option>`).join('');
            } else {
                skillSel.disabled=true;
                skillSel.innerHTML='<option>First choose category</option>';
            }
        });
        skillSel?.addEventListener('change',(e)=>{_selectedPrimarySkill=e.target.value;});
        
        document.getElementById('addGeneralSkillBtn')?.addEventListener('click',()=>{
            _generalSkills.push({category:'', skill:'', level:'Beginner'});
            renderGeneralSkillsList();
        });
    }
    
    // ==================== SUPABASE AUTH HANDLERS ====================
    async function handleSignin(e){
        e.preventDefault();
        const btn=document.getElementById('signinBtn');
        if(!btn) return;
        const origText='Sign in →';
        setLoading(btn, true, origText);
        
        const email=document.getElementById('siEmail')?.value.trim();
        const password=document.getElementById('siPassword')?.value;
        if(!email || !password){
            showToast("Email and password required", true);
            setLoading(btn, false, origText);
            return;
        }
        
        try {
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            
            const { data: profile, error: profileError } = await _supabase
                .from('profiles')
                .select('user_type, full_name')
                .eq('id', data.user.id)
                .single();
            
            if (profileError) throw profileError;
            
            localStorage.setItem('knk_current_user', JSON.stringify({
                id: data.user.id,
                email: email,
                type: profile.user_type,
                name: profile.full_name
            }));
            
            showToast(`✅ Welcome back, ${profile.full_name}! Redirecting...`);
            setTimeout(() => {
                if (profile.user_type === 'company') window.location.href = "settingsco.html";
                else window.location.href = "settingswo.html";
            }, 1000);
        } catch (error) {
            showToast(error.message, true);
        } finally {
            setLoading(btn, false, origText);
        }
    }
    
    async function handleSignup(e){
        e.preventDefault();
        const btn=document.getElementById('signupSubmitBtn');
        if(!btn) return;
        const origText='Agree & Join →';
        setLoading(btn, true, origText);
        
        try {
            if (_accountType === 'company') {
                const name = document.getElementById('compName')?.value.trim();
                const email = document.getElementById('compEmail')?.value.trim();
                const password = document.getElementById('compPass')?.value;
                const website = document.getElementById('compWeb')?.value.trim();
                const ceo = document.getElementById('compCeo')?.value.trim();
                const phone = document.getElementById('compPhone')?.value.trim();
                const address = document.getElementById('compAddr')?.value.trim();
                
                if (!name || !email || !password || _businessImages.length < 3 || !_selectedCategory) {
                    showToast("Missing required: name, email, password, category & 3+ images", true);
                    setLoading(btn, false, origText);
                    return;
                }
                if (password.length < 6) { showToast("Password min 6 characters", true); setLoading(btn, false, origText); return; }
                
                let logoUrl = null;
                if (_companyLogoBase64) logoUrl = await uploadToImgBB(_companyLogoBase64);
                
                const businessImageUrls = [];
                for (const imgBase64 of _businessImages) {
                    const url = await uploadToImgBB(imgBase64);
                    businessImageUrls.push(url);
                }
                
                const { data: authData, error: signUpError } = await _supabase.auth.signUp({
                    email, password,
                    options: { data: { full_name: name, user_type: 'company' } }
                });
                if (signUpError) throw signUpError;
                
                const userId = authData.user.id;
                
                const { error: profileError } = await _supabase.from('profiles').insert({
                    id: userId,
                    user_type: 'company',
                    full_name: name,
                    email: email,
                    phone: phone,
                    address: address,
                    avatar_url: logoUrl
                });
                if (profileError) throw profileError;
                
                const { error: companyError } = await _supabase.from('companies').insert({
                    user_id: userId,
                    company_name: name,
                    website: website,
                    ceo_name: ceo,
                    category: _selectedCategory,
                    phone: phone,
                    address: address,
                    business_images: businessImageUrls
                });
                if (companyError) throw companyError;
                
                localStorage.setItem('knk_current_user', JSON.stringify({ id: userId, email, type: 'company', name }));
                showToast("🎉 Company account created! Redirecting...");
                setTimeout(() => { window.location.href = "settingsco.html"; }, 1000);
                
            } else {
                const fullName = document.getElementById('workerNames')?.value.trim();
                const email = document.getElementById('workerEmail')?.value.trim();
                const password = document.getElementById('workerPass')?.value;
                const username = document.getElementById('workerUser')?.value.trim();
                const portfolio = document.getElementById('workerPort')?.value.trim();
                const address = document.getElementById('workerAddr')?.value.trim();
                const earningRange = document.getElementById('earningRange')?.value;
                
                if (!fullName || !email || !password || !_selectedPrimarySkill) {
                    showToast("Full name, email, password and primary skill required", true);
                    setLoading(btn, false, origText);
                    return;
                }
                if (password.length < 6) { showToast("Password min 6 characters", true); setLoading(btn, false, origText); return; }
                
                let avatarUrl = null;
                if (_workerAvatarBase64) avatarUrl = await uploadToImgBB(_workerAvatarBase64);
                
                const { data: authData, error: signUpError } = await _supabase.auth.signUp({
                    email, password,
                    options: { data: { full_name: fullName, user_type: 'worker' } }
                });
                if (signUpError) throw signUpError;
                
                const userId = authData.user.id;
                
                const { error: profileError } = await _supabase.from('profiles').insert({
                    id: userId,
                    user_type: 'worker',
                    full_name: fullName,
                    email: email,
                    address: address,
                    avatar_url: avatarUrl
                });
                if (profileError) throw profileError;
                
                const primarySkillParts = _selectedPrimarySkill.split(' - ');
                const primaryCat = primarySkillParts[0];
                const primaryName = primarySkillParts[1] || _selectedPrimarySkill;
                
                const { error: workerError } = await _supabase.from('workers').insert({
                    user_id: userId,
                    username: username,
                    portfolio_url: portfolio,
                    primary_skill_category: primaryCat,
                    primary_skill_name: primaryName,
                    general_skills: _generalSkills,
                    earning_range: earningRange,
                    address: address
                });
                if (workerError) throw workerError;
                
                localStorage.setItem('knk_current_user', JSON.stringify({ id: userId, email, type: 'worker', name: fullName }));
                showToast("✨ Freelancer profile created! Redirecting...");
                setTimeout(() => { window.location.href = "settingswo.html"; }, 1000);
            }
        } catch (error) {
            showToast(error.message, true);
        } finally {
            setLoading(btn, false, origText);
        }
    }
    
    // Initialize
    function init() {
        initSupabase();
        if (!_supabase) {
            showToast("Failed to initialize Supabase. Check your connection.", true);
            return;
        }
        _currentView = 'signin';
        render();
        document.getElementById('switchToSignInBtn')?.addEventListener('click', () => { _currentView = 'signin'; render(); });
        document.getElementById('switchToSignUpBtn')?.addEventListener('click', () => { _currentView = 'signup'; resetState(); render(); });
    }
    
    init();
</script>
</body>
</html>
