<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kazi ni Kazi · Freelancer Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, getDocs, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBbhxmAkHJtq3Zs17P4ewHsc8wi8-0M_XI",
            authDomain: "developers-imw.firebaseapp.com",
            databaseURL: "https://developers-imw-default-rtdb.firebaseio.com",
            projectId: "developers-imw",
            storageBucket: "developers-imw.firebasestorage.app",
            messagingSenderId: "182400720989",
            appId: "1:182400720989:web:180f2390f7563f1ec96db4",
            measurementId: "G-R7RDM0PMY8"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.firebaseDoc = doc;
        window.firebaseGetDoc = getDoc;
        window.firebaseSetDoc = setDoc;
        window.firebaseUpdateDoc = updateDoc;
        window.firebaseAddDoc = addDoc;
        window.firebaseGetDocs = getDocs;
        window.firebaseQuery = query;
        window.firebaseWhere = where;
        window.firebaseCollection = collection;
        window.firebaseDeleteDoc = deleteDoc;
    </script>
    <script src="config.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#f3f2ef;color:#191919;overflow-x:hidden;}
        .navbar{background:white;border-bottom:1px solid #e2e8f0;padding:0.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;position:sticky;top:0;z-index:100;}
        .logo-area{display:flex;align-items:center;gap:0.75rem;}
        .logo-area img{height:40px;width:auto;}
        .logo-text{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#0a66c2,#00a3ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .user-menu{display:flex;align-items:center;gap:1rem;}
        .avatar-sm{width:40px;height:40px;background:#0a66c2;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;background-size:cover;background-position:center;}
        .menu-icon{display:none;font-size:1.5rem;cursor:pointer;color:#0a66c2;}
        .dashboard-container{display:flex;max-width:1400px;margin:2rem auto;padding:0 1.5rem;gap:2rem;}
        .sidebar{width:280px;background:white;border-radius:1rem;border:1px solid #e2e8f0;padding:1rem;height:fit-content;position:sticky;top:90px;transition:transform 0.3s ease;}
        .sidebar-item{display:flex;align-items:center;gap:0.8rem;padding:0.8rem 1rem;border-radius:0.8rem;cursor:pointer;transition:all 0.2s;margin-bottom:0.3rem;color:#334155;}
        .sidebar-item i{width:24px;}
        .sidebar-item:hover{background:#eef2ff;}
        .sidebar-item.active{background:#0a66c2;color:white;}
        .logout-item{color:#dc2626;margin-top:1rem;border-top:1px solid #e2e8f0;padding-top:1rem;}
        .main-content{flex:1;background:white;border-radius:1rem;border:1px solid #e2e8f0;padding:1.5rem;min-height:70vh;}
        .tab-content{display:none;}
        .tab-content.active{display:block;}
        .form-group{margin-bottom:1.2rem;}
        label{font-weight:600;font-size:0.85rem;display:block;margin-bottom:0.3rem;color:#1e293b;}
        input,select,textarea{width:100%;padding:0.7rem;border:1px solid #cbd5e1;border-radius:0.5rem;font-family:inherit;font-size:0.9rem;}
        button.btn-primary{background:#0a66c2;color:white;border:none;padding:0.6rem 1.2rem;border-radius:2rem;cursor:pointer;font-weight:600;}
        button.btn-secondary{background:#e2e8f0;color:#334155;border:none;padding:0.6rem 1.2rem;border-radius:2rem;cursor:pointer;}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem;}
        .stat-card{background:#f8fafc;padding:1rem;border-radius:1rem;text-align:center;}
        .stat-number{font-size:2rem;font-weight:800;color:#0a66c2;}
        .availability-schedule{background:#f8fafc;padding:1rem;border-radius:1rem;margin-top:1rem;}
        .day-row{display:flex;align-items:center;gap:1rem;margin-bottom:0.8rem;flex-wrap:wrap;}
        .day-label{width:80px;font-weight:600;}
        .time-input{display:flex;gap:0.5rem;align-items:center;}
        .review-card{border:1px solid #e2e8f0;border-radius:1rem;padding:1rem;margin-bottom:1rem;}
        .stars{color:#fbbf24;}
        .badge{background:#eef2ff;padding:0.2rem 0.6rem;border-radius:20px;font-size:0.7rem;}
        .points-display{font-size:1.5rem;font-weight:800;color:#0a66c2;}
        .toast{position:fixed;bottom:20px;right:20px;background:#1f2937;color:white;padding:0.6rem 1.2rem;border-radius:40px;z-index:1000;font-size:0.85rem;}
        @media(max-width:800px){
            .dashboard-container{flex-direction:column;}
            .sidebar{position:fixed;top:70px;left:0;height:calc(100% - 70px);z-index:99;transform:translateX(-100%);transition:transform 0.3s;}
            .sidebar.open{transform:translateX(0);}
            .menu-icon{display:block;}
        }
        .loader{display:inline-block;width:20px;height:20px;border:2px solid white;border-radius:50%;border-top-color:transparent;animation:spin 0.6s linear infinite;margin-right:8px;vertical-align:middle;}
        @keyframes spin{to{transform:rotate(360deg);}}
    </style>
</head>
<body>
<nav class="navbar">
    <div style="display:flex; align-items:center; gap:1rem;">
        <i class="fas fa-bars menu-icon" id="menuIcon"></i>
        <div class="logo-area"><img src="images/logo.png" alt="Kazi ni Kazi" onerror="this.src='https://placehold.co/140x40'"><span class="logo-text">Kazi ni Kazi</span></div>
    </div>
    <div class="user-menu"><span id="workerNameDisplay">Freelancer</span><div class="avatar-sm" id="profileAvatar"><i class="fas fa-user"></i></div></div>
</nav>
<div class="dashboard-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-item" data-tab="profile"><i class="fas fa-user-edit"></i> Edit Profile</div>
        <div class="sidebar-item" data-tab="status"><i class="fas fa-calendar-alt"></i> Status & Schedule</div>
        <div class="sidebar-item" data-tab="analytics"><i class="fas fa-chart-line"></i> Analytics</div>
        <div class="sidebar-item" data-tab="notifications"><i class="fas fa-bell"></i> Notifications</div>
        <div class="sidebar-item" data-tab="verification"><i class="fas fa-check-circle"></i> Verification</div>
        <div class="sidebar-item" data-tab="reviews"><i class="fas fa-star"></i> Reviews & Points</div>
        <div class="sidebar-item logout-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Log out</div>
    </div>
    <div class="main-content" id="mainContent"></div>
</div>

<script>
    (function(){
        // ---------- FIREBASE REFERENCES ----------
        let db = null;
        let docRef = null;
        let getDocFn = null;
        let setDocFn = null;
        let updateDocFn = null;
        let addDocFn = null;
        let getDocsFn = null;
        let queryFn = null;
        let whereFn = null;
        let collectionFn = null;
        let deleteDocFn = null;
        
        // ---------- GLOBAL STATE ----------
        let workerId = null;
        let workerData = {
            name: '', email: '', username: '', portfolio: '',
            primarySkill: '', generalSkills: [], address: '',
            earningRange: '', avatar: ''
        };
        let availabilityStatus = 'available';
        let weeklySchedule = {
            monday: {enabled: false, start: '18:00', end: '08:00'},
            tuesday: {enabled: false, start: '18:00', end: '08:00'},
            wednesday: {enabled: false, start: '18:00', end: '08:00'},
            thursday: {enabled: false, start: '18:00', end: '08:00'},
            friday: {enabled: false, start: '18:00', end: '08:00'},
            saturday: {enabled: false, start: '18:00', end: '08:00'},
            sunday: {enabled: false, start: '18:00', end: '08:00'}
        };
        let notifications = [];
        let verificationRequested = false;
        let isVerified = false;
        let reviews = [];
        
        // Helper functions
        function showToast(msg, isErr=false){
            let t=document.createElement('div'); t.className='toast'; t.style.background=isErr?'#dc2626':'#1f2937'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
        }
        function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
        
        // ---------- FIREBASE DATA LOADING ----------
        async function loadWorkerProfile(){
            if(!workerId) return null;
            const userDoc = await getDocFn(docRef(db, "users", workerId));
            if(userDoc.exists()){
                const data = userDoc.data();
                return {
                    name: data.full_name || '',
                    email: data.email || '',
                    username: data.username || '',
                    portfolio: data.portfolio_url || '',
                    primarySkill: data.primary_skill_name || '',
                    generalSkills: data.general_skills || [],
                    address: data.address || '',
                    earningRange: data.earning_range || '100$-350$',
                    avatar: data.avatar_url || ''
                };
            }
            return null;
        }
        
        async function loadWorkerStatus(){
            const docSnap = await getDocFn(docRef(db, "workerStatus", workerId));
            if(docSnap.exists()){
                availabilityStatus = docSnap.data().status || 'available';
                weeklySchedule = docSnap.data().schedule || weeklySchedule;
            }
        }
        
        async function loadNotifications(){
            const q = queryFn(collectionFn(db, "notifications"), whereFn("userId", "==", workerId));
            const snapshot = await getDocsFn(q);
            notifications = [];
            snapshot.forEach(docSnap => {
                notifications.push({ id: docSnap.id, ...docSnap.data() });
            });
            notifications.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
        }
        
        async function loadVerificationStatus(){
            const docSnap = await getDocFn(docRef(db, "verificationRequests", workerId));
            if(docSnap.exists()){
                verificationRequested = docSnap.data().status === 'pending';
                isVerified = docSnap.data().status === 'approved';
            } else {
                verificationRequested = false;
                isVerified = false;
            }
        }
        
        async function loadReviews(){
            const q = queryFn(collectionFn(db, "reviews"), whereFn("revieweeId", "==", workerId));
            const snapshot = await getDocsFn(q);
            reviews = [];
            snapshot.forEach(docSnap => {
                reviews.push({ id: docSnap.id, ...docSnap.data() });
            });
            reviews.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
        }
        
        // ---------- SAVE OPERATIONS ----------
        async function saveWorkerProfile(profileData){
            await updateDocFn(docRef(db, "users", workerId), {
                full_name: profileData.name,
                email: profileData.email,
                username: profileData.username,
                portfolio_url: profileData.portfolio,
                general_skills: profileData.generalSkills,
                address: profileData.address,
                earning_range: profileData.earningRange,
                avatar_url: profileData.avatar,
                updatedAt: new Date().toISOString()
            });
        }
        
        async function saveWorkerStatus(status, schedule){
            await setDocFn(docRef(db, "workerStatus", workerId), {
                status: status,
                schedule: schedule,
                updatedAt: new Date().toISOString()
            });
        }
        
        async function addNotification(message){
            await addDocFn(collectionFn(db, "notifications"), {
                userId: workerId,
                message: message,
                createdAt: new Date().toISOString(),
                isRead: false
            });
            await loadNotifications();
        }
        
        async function requestVerification(){
            await setDocFn(docRef(db, "verificationRequests", workerId), {
                status: 'pending',
                requestedAt: new Date().toISOString()
            });
            verificationRequested = true;
            await addNotification("Verification request submitted. Admin will review within 48h.");
            showToast("Request sent!");
        }
        
        async function uploadToImgBB(base64Image){
            if(!base64Image) return null;
            let raw = base64Image.includes(',') ? base64Image.split(',')[1] : base64Image;
            const formData = new FormData();
            formData.append('image', raw);
            formData.append('key', KAZI_CONFIG.imgbb.apiKey);
            try{
                const res = await fetch(KAZI_CONFIG.imgbb.uploadUrl, { method:'POST', body:formData });
                const data = await res.json();
                return data.success ? data.data.url : null;
            } catch(e){ return null; }
        }
        
        // ---------- UI RENDER FUNCTIONS ----------
        function renderProfileForm(){
            const nameInput = document.getElementById('workerFullName');
            if(nameInput) nameInput.value = workerData.name || '';
            const usernameInput = document.getElementById('workerUsername');
            if(usernameInput) usernameInput.value = workerData.username || '';
            const portfolioInput = document.getElementById('workerPortfolio');
            if(portfolioInput) portfolioInput.value = workerData.portfolio || '';
            const primarySkillInput = document.getElementById('primarySkill');
            if(primarySkillInput) primarySkillInput.value = workerData.primarySkill || '';
            const generalSkillsInput = document.getElementById('generalSkills');
            if(generalSkillsInput) generalSkillsInput.value = (workerData.generalSkills || []).join(', ');
            const addressInput = document.getElementById('workerAddress');
            if(addressInput) addressInput.value = workerData.address || '';
            const emailInput = document.getElementById('workerEmail');
            if(emailInput) emailInput.value = workerData.email || '';
            const earningSelect = document.getElementById('earningRange');
            if(earningSelect) earningSelect.value = workerData.earningRange || '100$-350$';
            const avatarPreview = document.getElementById('avatarPreview');
            if(avatarPreview && workerData.avatar){
                avatarPreview.innerHTML = `<img src="${workerData.avatar}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;" onerror="this.style.display='none'">`;
            }
            const nameDisplay = document.getElementById('workerNameDisplay');
            if(nameDisplay) nameDisplay.innerText = workerData.name || 'Freelancer';
            const profileAvatar = document.getElementById('profileAvatar');
            if(profileAvatar && workerData.avatar){
                profileAvatar.style.backgroundImage = `url(${workerData.avatar})`;
                profileAvatar.style.backgroundSize = 'cover';
                profileAvatar.style.backgroundPosition = 'center';
                profileAvatar.innerHTML = '';
            } else if(profileAvatar){
                profileAvatar.style.backgroundImage = '';
                profileAvatar.innerHTML = '<i class="fas fa-user"></i>';
            }
        }
        
        function renderSchedule(){
            const container = document.getElementById('scheduleContainer');
            if(!container) return;
            const days = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
            container.innerHTML = days.map(day => `
                <div class="day-row">
                    <div class="day-label">${day.charAt(0).toUpperCase()+day.slice(1)}</div>
                    <label style="display:flex; align-items:center; gap:0.5rem;"><input type="checkbox" class="schedule-enable" data-day="${day}" ${weeklySchedule[day].enabled ? 'checked' : ''}> Enable off-hours</label>
                    <div class="time-input">
                        <input type="time" class="schedule-start" data-day="${day}" value="${weeklySchedule[day].start}" ${!weeklySchedule[day].enabled ? 'disabled' : ''}>
                        <span>to</span>
                        <input type="time" class="schedule-end" data-day="${day}" value="${weeklySchedule[day].end}" ${!weeklySchedule[day].enabled ? 'disabled' : ''}>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.schedule-enable').forEach(chk => {
                chk.addEventListener('change', (e) => {
                    const day = chk.getAttribute('data-day');
                    weeklySchedule[day].enabled = chk.checked;
                    const row = chk.closest('.day-row');
                    const startInput = row.querySelector('.schedule-start');
                    const endInput = row.querySelector('.schedule-end');
                    if(startInput) startInput.disabled = !chk.checked;
                    if(endInput) endInput.disabled = !chk.checked;
                });
            });
            document.querySelectorAll('.schedule-start').forEach(inp => {
                inp.addEventListener('change', (e) => { weeklySchedule[inp.getAttribute('data-day')].start = inp.value; });
            });
            document.querySelectorAll('.schedule-end').forEach(inp => {
                inp.addEventListener('change', (e) => { weeklySchedule[inp.getAttribute('data-day')].end = inp.value; });
            });
            const statusSelect = document.getElementById('availabilityStatus');
            if(statusSelect) statusSelect.value = availabilityStatus;
        }
        
        function renderNotifications(){
            const container = document.getElementById('notificationsList');
            if(!container) return;
            if(notifications.length === 0){ container.innerHTML = '<p>No notifications yet.</p>'; return; }
            container.innerHTML = notifications.map(n => `<div class="review-card">${escapeHtml(n.message)}<br><small>${new Date(n.createdAt).toLocaleString()}</small></div>`).join('');
        }
        
        function updateAnalytics(){
            // These values would normally come from contracts/bids – using mock for now
            const viewsEl = document.getElementById('profileViews');
            const earnedEl = document.getElementById('totalEarned');
            const jobsEl = document.getElementById('completedJobs');
            const rateEl = document.getElementById('responseRate');
            if(viewsEl) viewsEl.innerText = Math.floor(Math.random() * 200 + 50);
            if(earnedEl) earnedEl.innerText = `$${reviews.length * 150 + Math.floor(Math.random() * 500)}`;
            if(jobsEl) jobsEl.innerText = reviews.length;
            if(rateEl) rateEl.innerText = Math.floor(Math.random() * 30 + 70) + '%';
            const ctx = document.getElementById('analyticsChart')?.getContext('2d');
            if(ctx){
                ctx.clearRect(0,0,400,200);
                ctx.fillStyle = '#0a66c2';
                for(let i=0;i<7;i++) ctx.fillRect(i*50+20, 180 - (reviews.length*10 || 20), 30, (reviews.length*10 || 20));
            }
        }
        
        function updateVerificationUI(){
            const statusDiv = document.getElementById('verificationStatus');
            const requestBtn = document.getElementById('requestVerifyBtn');
            if(!statusDiv) return;
            if(isVerified){
                statusDiv.innerHTML = '<div style="color:#059669;"><i class="fas fa-check-circle"></i> Your profile is verified! Blue badge active.</div>';
                if(requestBtn) requestBtn.disabled = true;
            } else if(verificationRequested){
                statusDiv.innerHTML = '<div style="color:#eab308;">Verification request pending admin approval.</div>';
                if(requestBtn) requestBtn.disabled = true;
            } else {
                statusDiv.innerHTML = '<div>No verification badge. Request one below.</div>';
                if(requestBtn) requestBtn.disabled = false;
            }
        }
        
        function renderReviews(){
            const container = document.getElementById('reviewsList');
            if(!container) return;
            if(reviews.length === 0){
                container.innerHTML = '<p>No reviews yet. Complete jobs to receive feedback.</p>';
            } else {
                container.innerHTML = reviews.map(r => `
                    <div class="review-card">
                        <div class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
                        <p><strong>${escapeHtml(r.author || 'Client')}</strong> - ${new Date(r.createdAt).toLocaleDateString()}</p>
                        <p>${escapeHtml(r.comment)}</p>
                    </div>
                `).join('');
            }
            // Calculate points
            let totalStars = 0;
            reviews.forEach(r => totalStars += r.rating);
            const avg = reviews.length ? totalStars / reviews.length : 0;
            let points = reviews.length ? Math.floor(avg * 20) + (reviews.length * 5) : 0;
            const pointsDisplay = document.getElementById('totalPoints');
            if(pointsDisplay) pointsDisplay.innerText = points;
            const starDisplay = document.getElementById('starRatingDisplay');
            if(starDisplay) starDisplay.innerHTML = '★'.repeat(Math.round(avg)) + '☆'.repeat(5-Math.round(avg)) + ` (${avg.toFixed(1)})`;
            const recText = document.getElementById('recommendationText');
            if(recText){
                if(points >= 100) recText.innerText = '🏆 Highly Recommended Top Talent';
                else if(points >= 50) recText.innerText = '⭐ Recommended Professional';
                else recText.innerText = '📈 Building reputation, keep going!';
            }
        }
        
        // ---------- TAB RENDERING ----------
        function renderTabs() {
            const main = document.getElementById('mainContent');
            if(!main) return;
            main.innerHTML = `
                <div id="profileTab" class="tab-content"><h2>Edit Profile</h2><form id="profileForm"><div class="form-group"><label>Profile Picture</label><input type="file" id="avatarUpload" accept="image/*"><div id="avatarPreview" style="margin-top:0.5rem;"></div></div><div class="form-group"><label>Full Name *</label><input type="text" id="workerFullName" required></div><div class="form-group"><label>Username</label><input type="text" id="workerUsername"></div><div class="form-group"><label>Portfolio URL</label><input type="url" id="workerPortfolio"></div><div class="form-group"><label>Primary Skill</label><input type="text" id="primarySkill" readonly></div><div class="form-group"><label>General Skills (comma separated)</label><input type="text" id="generalSkills"></div><div class="form-group"><label>Address</label><input type="text" id="workerAddress"></div><div class="form-group"><label>Email *</label><input type="email" id="workerEmail" required></div><div class="form-group"><label>Earning Range</label><select id="earningRange"><option>10$-30$</option><option>40$-80$</option><option>100$-350$</option><option>400$-700$</option><option>800$-1000$</option><option>1000$+</option></select></div><button type="submit" class="btn-primary">Save Changes</button></form></div>
                <div id="statusTab" class="tab-content"><h2>Availability Status</h2><div class="form-group"><label>Current Status</label><select id="availabilityStatus"><option value="available">Available</option><option value="in_break">In Break</option><option value="not_available">Not Available</option></select></div><div class="availability-schedule"><h3>Weekly Schedule (off-hours)</h3><p style="font-size:0.8rem;">Set hours when you are NOT working (e.g., 18:00-08:00)</p><div id="scheduleContainer"></div><button id="saveScheduleBtn" class="btn-secondary" style="margin-top:1rem;">Save Schedule</button></div></div>
                <div id="analyticsTab" class="tab-content"><h2>Freelancer Analytics</h2><div class="stats-grid"><div class="stat-card"><div class="stat-number" id="profileViews">0</div><div>Profile Views</div></div><div class="stat-card"><div class="stat-number" id="totalEarned">$0</div><div>Total Earned</div></div><div class="stat-card"><div class="stat-number" id="completedJobs">0</div><div>Completed Jobs</div></div><div class="stat-card"><div class="stat-number" id="responseRate">0%</div><div>Response Rate</div></div></div><canvas id="analyticsChart" width="400" height="200" style="max-width:100%; height:auto;"></canvas></div>
                <div id="notificationsTab" class="tab-content"><h2>Notifications</h2><div id="notificationsList"></div><button id="requestPushBtn" class="btn-secondary">Enable Push Notifications</button></div>
                <div id="verificationTab" class="tab-content"><h2>Verification Badge</h2><div id="verificationStatus"></div><button id="requestVerifyBtn" class="btn-primary">Request Verification</button><p style="margin-top:1rem; font-size:0.8rem;">Verification increases trust and visibility. Admin reviews your profile.</p></div>
                <div id="reviewsTab" class="tab-content"><h2>Reviews & Reputation Points</h2><div style="background:#f8fafc; padding:1rem; border-radius:1rem; margin-bottom:1rem; text-align:center;"><div class="points-display" id="totalPoints">0</div><div>Reputation Points</div><div id="starRatingDisplay" class="stars" style="font-size:1.2rem;">☆☆☆☆☆</div><div id="recommendationText"></div></div><h3>Recent Reviews</h3><div id="reviewsList"></div></div>
            `;
            attachTabEvents();
        }
        
        function attachTabEvents(){
            // Profile save
            const profileForm = document.getElementById('profileForm');
            if(profileForm){
                profileForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const updated = {
                        name: document.getElementById('workerFullName')?.value.trim() || '',
                        email: document.getElementById('workerEmail')?.value.trim() || '',
                        username: document.getElementById('workerUsername')?.value.trim() || '',
                        portfolio: document.getElementById('workerPortfolio')?.value.trim() || '',
                        generalSkills: document.getElementById('generalSkills')?.value.split(',').map(s=>s.trim()).filter(s=>s) || [],
                        address: document.getElementById('workerAddress')?.value.trim() || '',
                        earningRange: document.getElementById('earningRange')?.value || '100$-350$',
                        avatar: workerData.avatar
                    };
                    await saveWorkerProfile(updated);
                    workerData = { ...workerData, ...updated };
                    renderProfileForm();
                    showToast("Profile updated");
                });
            }
            
            // Avatar upload
            const avatarUpload = document.getElementById('avatarUpload');
            if(avatarUpload){
                avatarUpload.addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    if(file){
                        const reader = new FileReader();
                        reader.onload = async (ev) => {
                            const url = await uploadToImgBB(ev.target.result);
                            if(url){
                                workerData.avatar = url;
                                await saveWorkerProfile(workerData);
                                renderProfileForm();
                                showToast("Avatar updated");
                            } else showToast("Upload failed", true);
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }
            
            // Status & schedule save
            const saveScheduleBtn = document.getElementById('saveScheduleBtn');
            if(saveScheduleBtn){
                saveScheduleBtn.addEventListener('click', async () => {
                    const statusSelect = document.getElementById('availabilityStatus');
                    if(statusSelect) availabilityStatus = statusSelect.value;
                    await saveWorkerStatus(availabilityStatus, weeklySchedule);
                    showToast("Schedule saved");
                });
            }
            
            // Push notifications
            const pushBtn = document.getElementById('requestPushBtn');
            if(pushBtn){
                pushBtn.addEventListener('click', () => {
                    if("Notification" in window) Notification.requestPermission();
                    else showToast("Not supported", true);
                });
            }
            
            // Request verification
            const verifyBtn = document.getElementById('requestVerifyBtn');
            if(verifyBtn){
                verifyBtn.addEventListener('click', async () => {
                    await requestVerification();
                    updateVerificationUI();
                });
            }
        }
        
        // ---------- TAB SWITCHING ----------
        function switchTab(tabId){
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            const activeTab = document.getElementById(tabId+'Tab');
            if(activeTab) activeTab.classList.add('active');
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            const activeSidebar = document.querySelector(`.sidebar-item[data-tab="${tabId}"]`);
            if(activeSidebar) activeSidebar.classList.add('active');
            
            if(tabId === 'profile') renderProfileForm();
            if(tabId === 'status') renderSchedule();
            if(tabId === 'analytics') updateAnalytics();
            if(tabId === 'notifications') renderNotifications();
            if(tabId === 'verification') updateVerificationUI();
            if(tabId === 'reviews') renderReviews();
        }
        
        // ---------- INITIALIZATION ----------
        async function init(){
            // Wait for Firebase globals
            let attempts = 0;
            while(!window.firebaseDb && attempts < 50){
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }
            if(!window.firebaseDb){
                showToast("Firebase failed to initialize", true);
                return;
            }
            db = window.firebaseDb;
            docRef = window.firebaseDoc;
            getDocFn = window.firebaseGetDoc;
            setDocFn = window.firebaseSetDoc;
            updateDocFn = window.firebaseUpdateDoc;
            addDocFn = window.firebaseAddDoc;
            getDocsFn = window.firebaseGetDocs;
            queryFn = window.firebaseQuery;
            whereFn = window.firebaseWhere;
            collectionFn = window.firebaseCollection;
            deleteDocFn = window.firebaseDeleteDoc;
            
            const storedUser = JSON.parse(localStorage.getItem('knk_current_user') || '{}');
            if(!storedUser.id || storedUser.type !== 'worker'){
                window.location.href = 'auth.html';
                return;
            }
            workerId = storedUser.id;
            
            // Load all data
            const profile = await loadWorkerProfile();
            if(profile) workerData = profile;
            else {
                workerData = {
                    name: storedUser.name || '',
                    email: storedUser.email || '',
                    username: '',
                    portfolio: '',
                    primarySkill: '',
                    generalSkills: [],
                    address: '',
                    earningRange: '100$-350$',
                    avatar: ''
                };
            }
            await loadWorkerStatus();
            await loadNotifications();
            await loadVerificationStatus();
            await loadReviews();
            
            renderTabs();
            renderProfileForm();
            
            setTimeout(() => {
                document.querySelectorAll('.sidebar-item[data-tab]').forEach(el => {
                    el.addEventListener('click', () => switchTab(el.getAttribute('data-tab')));
                });
                switchTab('profile');
            }, 50);
            
            // Mobile menu
            const menuIcon = document.getElementById('menuIcon');
            const sidebar = document.getElementById('sidebar');
            if(menuIcon && sidebar){
                menuIcon.addEventListener('click', () => sidebar.classList.toggle('open'));
                document.addEventListener('click', (e) => {
                    if(window.innerWidth <= 800 && !sidebar.contains(e.target) && !menuIcon.contains(e.target)) {
                        sidebar.classList.remove('open');
                    }
                });
            }
            
            const logoutBtn = document.getElementById('logoutBtn');
            if(logoutBtn){
                logoutBtn.addEventListener('click', () => {
                    localStorage.removeItem('knk_current_user');
                    window.location.href = 'auth.html';
                });
            }
        }
        
        init();
    })();
</script>
</body>
</html>
