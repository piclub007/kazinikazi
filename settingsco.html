<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kazi ni Kazi · Company Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, getDocs, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBbhxmAkHJtq3Zs17P4ewHsc8wi8-0M_XI",
            authDomain: "developers-imw.firebaseapp.com",
            databaseURL: "https://developers-imw-default-rtdb.firebaseio.com",
            projectId: "developers-imw",
            storageBucket: "developers-imw.firebasestorage.app",
            messagingSenderId: "182400720989",
            appId: "1:182400720989:web:180f2390f7563f1ec96db4",
            measurementId: "G-R7RDM0PMY8"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.firebaseDoc = doc;
        window.firebaseGetDoc = getDoc;
        window.firebaseSetDoc = setDoc;
        window.firebaseUpdateDoc = updateDoc;
        window.firebaseAddDoc = addDoc;
        window.firebaseGetDocs = getDocs;
        window.firebaseQuery = query;
        window.firebaseWhere = where;
        window.firebaseCollection = collection;
        window.firebaseDeleteDoc = deleteDoc;
    </script>
    <script src="config.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#f3f2ef;color:#191919;overflow-x:hidden;}
        .navbar{background:white;border-bottom:1px solid #e2e8f0;padding:0.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;position:sticky;top:0;z-index:100;}
        .logo-area{display:flex;align-items:center;gap:0.75rem;}
        .logo-area img{height:40px;width:auto;}
        .logo-text{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#0a66c2,#00a3ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .user-menu{display:flex;align-items:center;gap:1rem;}
        .avatar-sm{width:40px;height:40px;background:#0a66c2;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;background-size:cover;background-position:center;}
        .menu-icon{display:none;font-size:1.5rem;cursor:pointer;color:#0a66c2;}
        .dashboard-container{display:flex;max-width:1400px;margin:2rem auto;padding:0 1.5rem;gap:2rem;}
        .sidebar{width:280px;background:white;border-radius:1rem;border:1px solid #e2e8f0;padding:1rem;height:fit-content;position:sticky;top:90px;transition:transform 0.3s ease;}
        .sidebar-item{display:flex;align-items:center;gap:0.8rem;padding:0.8rem 1rem;border-radius:0.8rem;cursor:pointer;transition:all 0.2s;margin-bottom:0.3rem;color:#334155;}
        .sidebar-item i{width:24px;}
        .sidebar-item:hover{background:#eef2ff;}
        .sidebar-item.active{background:#0a66c2;color:white;}
        .logout-item{color:#dc2626;margin-top:1rem;border-top:1px solid #e2e8f0;padding-top:1rem;}
        .main-content{flex:1;background:white;border-radius:1rem;border:1px solid #e2e8f0;padding:1.5rem;min-height:70vh;}
        .tab-content{display:none;}
        .tab-content.active{display:block;}
        .form-group{margin-bottom:1.2rem;}
        label{font-weight:600;font-size:0.85rem;display:block;margin-bottom:0.3rem;color:#1e293b;}
        input,select,textarea{width:100%;padding:0.7rem;border:1px solid #cbd5e1;border-radius:0.5rem;font-family:inherit;font-size:0.9rem;}
        .inline-row{display:flex;gap:0.8rem;flex-wrap:wrap;align-items:center;}
        button.btn-primary{background:#0a66c2;color:white;border:none;padding:0.6rem 1.2rem;border-radius:2rem;cursor:pointer;font-weight:600;}
        button.btn-secondary{background:#e2e8f0;color:#334155;border:none;padding:0.6rem 1.2rem;border-radius:2rem;cursor:pointer;}
        .job-card,.submission-card,.form-card{border:1px solid #e2e8f0;border-radius:1rem;padding:1rem;margin-bottom:1rem;}
        .flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;}
        .badge{background:#eef2ff;padding:0.2rem 0.6rem;border-radius:20px;font-size:0.7rem;}
        .searchable-select{position:relative;}
        .searchable-select input{width:100%;}
        .searchable-dropdown{position:absolute;top:100%;left:0;right:0;background:white;border:1px solid #cbd5e1;border-radius:0.5rem;max-height:200px;overflow-y:auto;z-index:20;display:none;}
        .searchable-dropdown.show{display:block;}
        .searchable-option{padding:0.5rem 0.8rem;cursor:pointer;}
        .searchable-option:hover{background:#eef2ff;}
        .form-builder-layout{display:flex;gap:1.5rem;flex-wrap:wrap;}
        .components-panel{width:240px;background:#f8fafc;border-radius:1rem;padding:1rem;border:1px solid #e2e8f0;}
        .component-item{background:white;border:1px solid #cbd5e1;border-radius:0.5rem;padding:0.5rem;margin-bottom:0.5rem;cursor:grab;display:flex;align-items:center;gap:0.5rem;}
        .form-builder-area{flex:1;background:#fefefe;border-radius:1rem;border:2px dashed #cbd5e1;min-height:400px;padding:1rem;}
        .form-field{background:white;border:1px solid #cbd5e1;border-radius:0.8rem;padding:0.8rem;margin-bottom:0.8rem;display:flex;justify-content:space-between;align-items:center;}
        .drag-handle{cursor:grab;margin-right:0.5rem;color:#64748b;}
        .field-tools button{background:none;border:none;cursor:pointer;margin-left:0.5rem;color:#64748b;}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem;}
        .stat-card{background:#f8fafc;padding:1rem;border-radius:1rem;text-align:center;}
        .stat-number{font-size:2rem;font-weight:800;color:#0a66c2;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:1000;}
        .modal-content{background:white;border-radius:1rem;padding:1.5rem;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;}
        .toast{position:fixed;bottom:20px;right:20px;background:#1f2937;color:white;padding:0.6rem 1.2rem;border-radius:40px;z-index:1000;font-size:0.85rem;}
        @media(max-width:800px){
            .dashboard-container{flex-direction:column;}
            .sidebar{position:fixed;top:70px;left:0;height:calc(100% - 70px);z-index:99;transform:translateX(-100%);transition:transform 0.3s;}
            .sidebar.open{transform:translateX(0);}
            .menu-icon{display:block;}
            .form-builder-layout{flex-direction:column;}
            .components-panel{width:100%;}
        }
        .loader{display:inline-block;width:20px;height:20px;border:2px solid white;border-radius:50%;border-top-color:transparent;animation:spin 0.6s linear infinite;margin-right:8px;vertical-align:middle;}
        @keyframes spin{to{transform:rotate(360deg);}}
    </style>
</head>
<body>
<nav class="navbar">
    <div style="display:flex; align-items:center; gap:1rem;">
        <i class="fas fa-bars menu-icon" id="menuIcon"></i>
        <div class="logo-area"><img src="images/logo.png" alt="Kazi ni Kazi" onerror="this.src='https://placehold.co/140x40'"><span class="logo-text">Kazi ni Kazi</span></div>
    </div>
    <div class="user-menu"><span id="companyNameDisplay">Company</span><div class="avatar-sm" id="profileAvatar"><i class="fas fa-building"></i></div></div>
</nav>
<div class="dashboard-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-item" data-tab="profile"><i class="fas fa-user-edit"></i> Edit Profile</div>
        <div class="sidebar-item" data-tab="postjob"><i class="fas fa-plus-circle"></i> Post Job</div>
        <div class="sidebar-item" data-tab="analytics"><i class="fas fa-chart-line"></i> Analytics</div>
        <div class="sidebar-item" data-tab="formbuilder"><i class="fas fa-drag-drop"></i> Applying Form</div>
        <div class="sidebar-item" data-tab="formsmanager"><i class="fas fa-folder-open"></i> Forms Manager</div>
        <div class="sidebar-item" data-tab="submissions"><i class="fas fa-inbox"></i> Submissions</div>
        <div class="sidebar-item" data-tab="notifications"><i class="fas fa-bell"></i> Notifications</div>
        <div class="sidebar-item" data-tab="managejobs"><i class="fas fa-briefcase"></i> Manage Jobs</div>
        <div class="sidebar-item" data-tab="verified"><i class="fas fa-check-circle"></i> Verified</div>
        <div class="sidebar-item logout-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Log out</div>
    </div>
    <div class="main-content" id="mainContent"></div>
</div>

<script>
    (function(){
        // ---------- FIREBASE REFERENCES ----------
        let db = null;
        let docRef = null;
        let getDocFn = null;
        let setDocFn = null;
        let updateDocFn = null;
        let addDocFn = null;
        let getDocsFn = null;
        let queryFn = null;
        let whereFn = null;
        let collectionFn = null;
        let deleteDocFn = null;
        
        // ---------- GLOBAL STATE ----------
        let companyId = null;
        let jobs = [];
        let jobForms = {};       // key: jobId, value: formFields array
        let formsList = [];      // array of {formId, jobId, jobTitle, formFields}
        let submissions = [];
        let notifications = [];
        let verificationRequested = false;
        let isVerified = false;
        
        let companyData = { name: '', email: '', category: '', logo: '', website: '', ceo: '', phone: '', address: '' };
        
        const COMPANY_CATEGORIES = [
            "Food & Hospitality","Retail & Shops","Construction","Real Estate","Technology & IT Services",
            "Digital Agencies","Marketing & Advertising","Events & Entertainment","Transportation & Logistics",
            "Delivery Services","Health & Medical Services","Pharmacies","Fitness & Gyms","Beauty & Personal Care",
            "Education & Training","Financial Services","Insurance","Legal Services","Agriculture & Farming",
            "Manufacturing","Wholesale & Distribution","Cleaning Services","Repair & Maintenance","Security Services",
            "Printing & Publishing","Media & Broadcasting","Travel & Tourism","Non-Profit Organizations",
            "Government & Public Services","Consulting & Business Services"
        ];
        
        // Helper functions
        function showToast(msg, isErr=false){
            let t=document.createElement('div'); t.className='toast'; t.style.background=isErr?'#dc2626':'#1f2937'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
        }
        function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
        
        // ---------- FIREBASE DATA LOADING ----------
        async function loadCompanyProfile(){
            if(!companyId) return null;
            const userDoc = await getDocFn(docRef(db, "users", companyId));
            if(userDoc.exists()){
                const data = userDoc.data();
                return {
                    name: data.company_name || data.full_name || '',
                    email: data.email || '',
                    category: data.category || '',
                    logo: data.avatar_url || '',
                    website: data.website || '',
                    ceo: data.ceo_name || '',
                    phone: data.phone || '',
                    address: data.address || ''
                };
            }
            return null;
        }
        
        async function loadJobs(){
            const q = queryFn(collectionFn(db, "jobs"), whereFn("companyId", "==", companyId));
            const snapshot = await getDocsFn(q);
            jobs = [];
            snapshot.forEach(docSnap => {
                jobs.push({ id: docSnap.id, ...docSnap.data() });
            });
            jobs.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
        }
        
        async function loadJobForms(){
            const q = queryFn(collectionFn(db, "jobForms"), whereFn("companyId", "==", companyId));
            const snapshot = await getDocsFn(q);
            jobForms = {};
            formsList = [];
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                const jobId = data.jobId;
                const formFields = data.formFields;
                jobForms[jobId] = formFields;
                const job = jobs.find(j => j.id === jobId);
                formsList.push({
                    formId: docSnap.id,
                    jobId: jobId,
                    jobTitle: job ? job.title : 'Unknown Job',
                    formFields: formFields
                });
            });
        }
        
        async function loadSubmissions(){
            const q = queryFn(collectionFn(db, "submissions"), whereFn("companyId", "==", companyId));
            const snapshot = await getDocsFn(q);
            submissions = [];
            snapshot.forEach(docSnap => {
                submissions.push({ id: docSnap.id, ...docSnap.data() });
            });
        }
        
        async function loadNotifications(){
            const q = queryFn(collectionFn(db, "notifications"), whereFn("userId", "==", companyId));
            const snapshot = await getDocsFn(q);
            notifications = [];
            snapshot.forEach(docSnap => {
                notifications.push({ id: docSnap.id, ...docSnap.data() });
            });
            notifications.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
        }
        
        async function loadVerificationStatus(){
            const docSnap = await getDocFn(docRef(db, "verificationRequests", companyId));
            if(docSnap.exists()){
                verificationRequested = docSnap.data().status === 'pending';
                isVerified = docSnap.data().status === 'approved';
            } else {
                verificationRequested = false;
                isVerified = false;
            }
        }
        
        // ---------- SAVE OPERATIONS ----------
        async function saveCompanyProfile(profileData){
            await updateDocFn(docRef(db, "users", companyId), {
                company_name: profileData.name,
                website: profileData.website,
                ceo_name: profileData.ceo,
                phone: profileData.phone,
                address: profileData.address,
                email: profileData.email,
                avatar_url: profileData.logo,
                updatedAt: new Date().toISOString()
            });
        }
        
        async function addJob(jobData){
            await addDocFn(collectionFn(db, "jobs"), {
                ...jobData,
                companyId: companyId,
                createdAt: new Date().toISOString(),
                status: 'open'
            });
        }
        
        async function deleteJob(jobId){
            await deleteDocFn(docRef(db, "jobs", jobId));
            // Delete associated form
            const formQuery = queryFn(collectionFn(db, "jobForms"), whereFn("jobId", "==", jobId));
            const formSnapshot = await getDocsFn(formQuery);
            formSnapshot.forEach(async (f) => await deleteDocFn(docRef(db, "jobForms", f.id)));
        }
        
        async function saveJobForm(jobId, formFields){
            const q = queryFn(collectionFn(db, "jobForms"), whereFn("jobId", "==", jobId));
            const snapshot = await getDocsFn(q);
            if(!snapshot.empty){
                await updateDocFn(docRef(db, "jobForms", snapshot.docs[0].id), { formFields, updatedAt: new Date().toISOString() });
            } else {
                await addDocFn(collectionFn(db, "jobForms"), {
                    companyId: companyId,
                    jobId: jobId,
                    formFields: formFields,
                    createdAt: new Date().toISOString()
                });
            }
        }
        
        async function deleteForm(formId){
            await deleteDocFn(docRef(db, "jobForms", formId));
        }
        
        async function transferForm(formId, newJobId){
            const formDoc = await getDocFn(docRef(db, "jobForms", formId));
            if(formDoc.exists()){
                const formFields = formDoc.data().formFields;
                await addDocFn(collectionFn(db, "jobForms"), {
                    companyId: companyId,
                    jobId: newJobId,
                    formFields: formFields,
                    createdAt: new Date().toISOString()
                });
                await deleteDocFn(docRef(db, "jobForms", formId));
            }
        }
        
        async function addNotification(message){
            await addDocFn(collectionFn(db, "notifications"), {
                userId: companyId,
                message: message,
                createdAt: new Date().toISOString(),
                isRead: false
            });
            await loadNotifications();
        }
        
        async function requestVerification(){
            await setDocFn(docRef(db, "verificationRequests", companyId), {
                status: 'pending',
                requestedAt: new Date().toISOString()
            });
            verificationRequested = true;
            await addNotification("Verification request submitted. Admin will review within 48h.");
            showToast("Request sent!");
        }
        
        // ---------- UI RENDER FUNCTIONS ----------
        function renderManageJobs(){
            const container = document.getElementById('manageJobsList');
            if(!container) return;
            if(jobs.length === 0){ container.innerHTML = '<p>No jobs posted yet. Click "Post Job" to start.</p>'; return; }
            container.innerHTML = jobs.map(job => `
                <div class="job-card">
                    <div class="flex-between"><h3>${escapeHtml(job.title)}</h3><span class="badge">${job.status}</span></div>
                    <p>${escapeHtml(job.description?.substring(0,100)||'')}...</p>
                    <p><strong>💰 ${job.payout?.amount || '?'} ${job.payout?.currency || 'USD'} ${job.payout?.period || ''}</strong></p>
                    <div style="margin-top:0.5rem;">
                        <button class="btn-secondary" onclick="window.editJob('${job.id}')">Edit</button>
                        <button class="btn-secondary" style="background:#fee2e2;" onclick="window.deleteJob('${job.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        window.editJob = async (jobId) => {
            const job = jobs.find(j => j.id === jobId);
            if(job){
                const titleInput = document.getElementById('jobTitle');
                const roleInput = document.getElementById('jobRole');
                const catSearch = document.getElementById('categorySearchInput');
                const catHidden = document.getElementById('jobCategory');
                const skillsInput = document.getElementById('jobSkills');
                const descInput = document.getElementById('jobDesc');
                const reqInput = document.getElementById('jobRequirements');
                const amountInput = document.getElementById('payoutAmount');
                const currencySelect = document.getElementById('payoutCurrency');
                const periodSelect = document.getElementById('payoutPeriod');
                const deadlineInput = document.getElementById('jobDeadline');
                
                if(titleInput) titleInput.value = job.title;
                if(roleInput) roleInput.value = job.role;
                if(catSearch) catSearch.value = job.category;
                if(catHidden) catHidden.value = job.category;
                if(skillsInput) skillsInput.value = (job.skills || []).join(', ');
                if(descInput) descInput.value = job.description;
                if(reqInput) reqInput.value = job.requirements || '';
                if(amountInput) amountInput.value = job.payout?.amount || '';
                if(currencySelect) currencySelect.value = job.payout?.currency || 'USD';
                if(periodSelect) periodSelect.value = job.payout?.period || 'per hour';
                if(deadlineInput) deadlineInput.value = job.deadline || '';
                
                await window.deleteJob(jobId);
                switchTab('postjob');
                showToast("Edit mode: modify and repost");
            }
        };
        
        window.deleteJob = async (jobId) => {
            await deleteJob(jobId);
            await loadJobs();
            await loadJobForms();
            renderManageJobs();
            renderFormsManager();
            updateJobSelects();
            updateAnalytics();
            showToast("Job deleted");
        };
        
        function updateJobSelects(){
            const selectForm = document.getElementById('formJobSelect');
            const selectSub = document.getElementById('submissionJobSelect');
            const options = jobs.map(j => `<option value="${j.id}">${escapeHtml(j.title)}</option>`).join('');
            if(selectForm){
                selectForm.innerHTML = '<option value="">-- Select Job --</option>' + options;
                selectForm.onchange = () => {
                    const selected = selectForm.value;
                    if(selected && jobForms[selected]) currentFormFields = jobForms[selected];
                    else currentFormFields = [];
                    if(window.renderFormBuilder) window.renderFormBuilder();
                };
            }
            if(selectSub){
                selectSub.innerHTML = '<option value="">All Jobs</option>' + options;
                selectSub.onchange = () => { if(window.renderSubmissions) window.renderSubmissions(); };
            }
        }
        
        function renderSubmissions(){
            const jobId = document.getElementById('submissionJobSelect')?.value;
            let filtered = submissions;
            if(jobId) filtered = submissions.filter(s => s.jobId === jobId);
            const container = document.getElementById('submissionsList');
            if(!container) return;
            if(filtered.length === 0){ container.innerHTML = '<p>No submissions yet.</p>'; return; }
            container.innerHTML = filtered.map(sub => `
                <div class="submission-card">
                    <div class="flex-between"><strong>Job: ${escapeHtml(sub.jobTitle)}</strong><span>${new Date(sub.submittedAt).toLocaleString()}</span></div>
                    <pre style="background:#f1f5f9;padding:0.5rem;border-radius:0.5rem;">${JSON.stringify(sub.formData, null, 2)}</pre>
                </div>
            `).join('');
        }
        
        function renderNotifications(){
            const container = document.getElementById('notificationsList');
            if(!container) return;
            if(notifications.length === 0){ container.innerHTML = '<p>No notifications yet.</p>'; return; }
            container.innerHTML = notifications.map(n => `<div class="job-card">${escapeHtml(n.message)}<br><small>${new Date(n.createdAt).toLocaleString()}</small></div>`).join('');
        }
        
        function updateAnalytics(){
            const viewsEl = document.getElementById('profileViews');
            const jobsEl = document.getElementById('totalJobsPosted');
            const subsEl = document.getElementById('totalSubmissions');
            const activeEl = document.getElementById('activeJobs');
            if(viewsEl) viewsEl.innerText = Math.floor(Math.random() * 200 + 50);
            if(jobsEl) jobsEl.innerText = jobs.length;
            if(subsEl) subsEl.innerText = submissions.length;
            if(activeEl) activeEl.innerText = jobs.filter(j => j.status === 'open').length;
            const ctx = document.getElementById('analyticsChart')?.getContext('2d');
            if(ctx){
                ctx.clearRect(0,0,400,200);
                ctx.fillStyle = '#0a66c2';
                for(let i=0;i<7;i++) ctx.fillRect(i*50+20, 180 - (submissions.length*10 || 20), 30, (submissions.length*10 || 20));
            }
        }
        
        function updateVerifiedUI(){
            const statusDiv = document.getElementById('verificationStatus');
            const requestBtn = document.getElementById('requestVerifyBtn');
            if(!statusDiv) return;
            if(isVerified){
                statusDiv.innerHTML = '<div style="color:#059669;"><i class="fas fa-check-circle"></i> Verified! Blue badge active.</div>';
                if(requestBtn) requestBtn.disabled = true;
            } else if(verificationRequested){
                statusDiv.innerHTML = '<div style="color:#eab308;">Verification pending admin approval.</div>';
                if(requestBtn) requestBtn.disabled = true;
            } else {
                statusDiv.innerHTML = '<div>Not verified. Request verification below.</div>';
                if(requestBtn) requestBtn.disabled = false;
            }
        }
        
        // ---------- FORMS MANAGER ----------
        function renderFormsManager(){
            const container = document.getElementById('formsManagerList');
            if(!container) return;
            if(formsList.length === 0){
                container.innerHTML = '<p>No forms created yet. Go to "Applying Form" to create forms for your jobs.</p>';
                return;
            }
            container.innerHTML = formsList.map(form => `
                <div class="form-card">
                    <div class="flex-between">
                        <div><strong>${escapeHtml(form.jobTitle)}</strong> <span class="badge">${form.formFields.length} fields</span></div>
                        <div>
                            <button class="btn-secondary" onclick="window.editForm('${form.formId}', '${form.jobId}')">Edit</button>
                            <button class="btn-secondary" onclick="window.transferForm('${form.formId}')">Transfer</button>
                            <button class="btn-secondary" style="background:#fee2e2;" onclick="window.deleteForm('${form.formId}')">Delete</button>
                        </div>
                    </div>
                    <p style="margin-top:0.5rem; font-size:0.8rem;">Fields: ${form.formFields.map(f => f.type).join(', ')}</p>
                </div>
            `).join('');
        }
        
        window.editForm = async (formId, jobId) => {
            // Load the form into form builder and switch to that tab
            const formDoc = await getDocFn(docRef(db, "jobForms", formId));
            if(formDoc.exists()){
                currentFormFields = formDoc.data().formFields;
                selectedFormJobId = jobId;
                if(window.renderFormBuilder) window.renderFormBuilder();
                switchTab('formbuilder');
                showToast("Form loaded for editing. Save to apply changes.");
            }
        };
        
        window.transferForm = async (formId) => {
            if(jobs.length === 0){
                showToast("No other jobs available to transfer to.", true);
                return;
            }
            const jobOptions = jobs.map(j => `<option value="${j.id}">${escapeHtml(j.title)}</option>`).join('');
            const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>Transfer Form to Another Job</h3>
                    <select id="transferJobSelect">${jobOptions}</select>
                    <div style="margin-top:1rem;">
                        <button class="btn-primary" id="confirmTransferBtn">Transfer</button>
                        <button class="btn-secondary" id="cancelTransferBtn">Cancel</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('confirmTransferBtn').onclick = async () => {
                const newJobId = document.getElementById('transferJobSelect').value;
                if(newJobId){
                    await transferForm(formId, newJobId);
                    await loadJobForms();
                    renderFormsManager();
                    showToast("Form transferred successfully");
                }
                modal.remove();
            };
            document.getElementById('cancelTransferBtn').onclick = () => modal.remove();
            modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
        };
        
        window.deleteForm = async (formId) => {
            if(confirm("Are you sure you want to delete this form? This action cannot be undone.")){
                await deleteForm(formId);
                await loadJobForms();
                renderFormsManager();
                showToast("Form deleted");
            }
        };
        
        // ---------- FORM BUILDER ----------
        let currentFormFields = [];
        let selectedFormJobId = null;
        let formContainer = null;
        
        function renderFormBuilder(){
            if(!formContainer) formContainer = document.getElementById('formFieldsContainer');
            if(!formContainer) return;
            formContainer.innerHTML = currentFormFields.map((field, idx) => `
                <div class="form-field" data-idx="${idx}">
                    <div style="display:flex; align-items:center; gap:0.5rem; flex:1; flex-wrap:wrap;">
                        <i class="fas fa-grip-vertical drag-handle"></i>
                        <span><strong>${field.type}</strong>: ${escapeHtml(field.label)}</span>
                        <button class="btn-secondary" style="padding:0.2rem 0.5rem;" onclick="window.editFieldParams(${idx})"><i class="fas fa-cog"></i> Params</button>
                    </div>
                    <div class="field-tools"><button onclick="window.removeField(${idx})"><i class="fas fa-trash"></i></button></div>
                </div>
            `).join('');
            attachDragSort();
        }
        
        window.editFieldParams = (idx) => {
            const field = currentFormFields[idx];
            let html = `<div><h3>Edit ${field.type}</h3><label>Label:</label><input type="text" id="paramLabel" value="${field.label}"><br>`;
            if(field.type === 'text') html += `<label>Min length:</label><input type="number" id="paramMin" value="${field.min||''}"><label>Max length:</label><input type="number" id="paramMax" value="${field.max||''}">`;
            else if(field.type === 'textarea') html += `<label>Max length:</label><input type="number" id="paramMax" value="${field.max||''}">`;
            else if(field.type === 'number') html += `<label>Min:</label><input type="number" id="paramMin" value="${field.min||''}"><label>Max:</label><input type="number" id="paramMax" value="${field.max||''}">`;
            else if(field.type === 'dropdown' || field.type === 'checkbox') {
                html += `<label>Options (one per line):</label><textarea id="paramOptions" rows="3">${(field.options || []).join('\n')}</textarea>`;
            } else if(field.type === 'file') html += `<label>Max files:</label><input type="number" id="paramMaxFiles" value="${field.maxFiles||1}">`;
            html += `<div style="margin-top:1rem;"><button id="saveParamsBtn" class="btn-primary">Save</button></div></div>`;
            const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex';
            modal.innerHTML = `<div class="modal-content">${html}</div>`;
            document.body.appendChild(modal);
            document.getElementById('saveParamsBtn').onclick = () => {
                field.label = document.getElementById('paramLabel').value;
                if(field.type === 'text' || field.type === 'number') { field.min = document.getElementById('paramMin')?.value; field.max = document.getElementById('paramMax')?.value; }
                if(field.type === 'textarea') field.max = document.getElementById('paramMax')?.value;
                if(field.type === 'dropdown' || field.type === 'checkbox') field.options = document.getElementById('paramOptions').value.split('\n').filter(o=>o.trim());
                if(field.type === 'file') field.maxFiles = document.getElementById('paramMaxFiles')?.value;
                modal.remove(); renderFormBuilder();
            };
            modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
        };
        
        window.removeField = (idx) => { currentFormFields.splice(idx,1); renderFormBuilder(); };
        
        function attachDragSort(){
            const items = document.querySelectorAll('.form-field');
            items.forEach(item => {
                item.setAttribute('draggable', 'true');
                item.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', item.getAttribute('data-idx')); item.classList.add('dragging'); });
                item.addEventListener('dragend', (e) => { item.classList.remove('dragging'); });
                item.addEventListener('dragover', (e) => e.preventDefault());
                item.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                    const toIdx = parseInt(item.getAttribute('data-idx'));
                    if (!isNaN(fromIdx) && !isNaN(toIdx) && fromIdx !== toIdx) {
                        const moved = currentFormFields.splice(fromIdx, 1)[0];
                        currentFormFields.splice(toIdx, 0, moved);
                        renderFormBuilder();
                    }
                });
            });
        }
        
        async function uploadToImgBB(base64Image){
            if(!base64Image) return null;
            let raw = base64Image.includes(',') ? base64Image.split(',')[1] : base64Image;
            const formData = new FormData();
            formData.append('image', raw);
            formData.append('key', KAZI_CONFIG.imgbb.apiKey);
            try{
                const res = await fetch(KAZI_CONFIG.imgbb.uploadUrl, { method:'POST', body:formData });
                const data = await res.json();
                return data.success ? data.data.url : null;
            } catch(e){ return null; }
        }
        
        // ---------- PROFILE UI UPDATE ----------
        function updateProfileUI(){
            const nameInput = document.getElementById('compName');
            if(nameInput) nameInput.value = companyData.name || '';
            const websiteInput = document.getElementById('compWebsite');
            if(websiteInput) websiteInput.value = companyData.website || '';
            const ceoInput = document.getElementById('compCeo');
            if(ceoInput) ceoInput.value = companyData.ceo || '';
            const categoryInput = document.getElementById('compCategory');
            if(categoryInput) categoryInput.value = companyData.category || '';
            const phoneInput = document.getElementById('compPhone');
            if(phoneInput) phoneInput.value = companyData.phone || '';
            const addressInput = document.getElementById('compAddress');
            if(addressInput) addressInput.value = companyData.address || '';
            const emailInput = document.getElementById('compEmail');
            if(emailInput) emailInput.value = companyData.email || '';
            const logoPreview = document.getElementById('logoPreview');
            if(logoPreview && companyData.logo){
                logoPreview.innerHTML = `<img src="${companyData.logo}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;" onerror="this.style.display='none'">`;
            }
            const nameDisplay = document.getElementById('companyNameDisplay');
            if(nameDisplay) nameDisplay.innerText = companyData.name || 'Company';
            const profileAvatar = document.getElementById('profileAvatar');
            if(profileAvatar && companyData.logo){
                profileAvatar.style.backgroundImage = `url(${companyData.logo})`;
                profileAvatar.style.backgroundSize = 'cover';
                profileAvatar.style.backgroundPosition = 'center';
                profileAvatar.innerHTML = '';
            } else if(profileAvatar){
                profileAvatar.style.backgroundImage = '';
                profileAvatar.innerHTML = '<i class="fas fa-building"></i>';
            }
        }
        
        // ---------- TAB RENDERING ----------
        function renderTabs() {
            const main = document.getElementById('mainContent');
            if(!main) return;
            main.innerHTML = `
                <div id="profileTab" class="tab-content"><h2>Edit Company Profile</h2><form id="profileForm"><div class="form-group"><label>Company Logo</label><input type="file" id="logoUpload" accept="image/*"><div id="logoPreview" style="margin-top:0.5rem;"></div></div><div class="form-group"><label>Company Name *</label><input type="text" id="compName" required></div><div class="form-group"><label>Website</label><input type="url" id="compWebsite"></div><div class="form-group"><label>CEO / Social Name</label><input type="text" id="compCeo"></div><div class="form-group"><label>Category</label><input type="text" id="compCategory" readonly></div><div class="form-group"><label>Phone</label><input type="tel" id="compPhone"></div><div class="form-group"><label>Address</label><input type="text" id="compAddress"></div><div class="form-group"><label>Email *</label><input type="email" id="compEmail" required></div><button type="submit" class="btn-primary">Save Changes</button></form></div>
                <div id="postjobTab" class="tab-content"><h2>Post a New Job</h2><form id="jobPostForm"><div class="form-group"><label>Job Title *</label><input type="text" id="jobTitle" required></div><div class="form-group"><label>Role *</label><input type="text" id="jobRole" required></div><div class="form-group"><label>Category *</label><div class="searchable-select"><input type="text" id="categorySearchInput" placeholder="Search category..."><div id="categoryDropdown" class="searchable-dropdown"></div></div><input type="hidden" id="jobCategory" required></div><div class="form-group"><label>Main Skills (comma separated)</label><input type="text" id="jobSkills" placeholder="React, Python, UI Design"></div><div class="form-group"><label>Description *</label><textarea id="jobDesc" rows="4" required></textarea></div><div class="form-group"><label>Requirements *</label><textarea id="jobRequirements" rows="3" placeholder="List specific requirements..."></textarea></div><div class="form-group"><label>Estimated Payout</label><div class="inline-row"><input type="number" id="payoutAmount" placeholder="Amount" style="flex:2;"><select id="payoutCurrency" style="flex:1;"><option value="USD">USD</option><option value="EUR">EUR</option><option value="RWF">RWF</option></select><select id="payoutPeriod" style="flex:1;"><option>per hour</option><option>per month</option><option>per year</option></select></div></div><div class="form-group"><label>Deadline (optional)</label><input type="date" id="jobDeadline"></div><button type="submit" class="btn-primary" id="postJobBtn">Post Job</button></form></div>
                <div id="analyticsTab" class="tab-content"><h2>Analytics</h2><div class="stats-grid"><div class="stat-card"><div class="stat-number" id="profileViews">0</div><div>Profile Views</div></div><div class="stat-card"><div class="stat-number" id="totalJobsPosted">0</div><div>Jobs Posted</div></div><div class="stat-card"><div class="stat-number" id="totalSubmissions">0</div><div>Applications Received</div></div><div class="stat-card"><div class="stat-number" id="activeJobs">0</div><div>Active Jobs</div></div></div><canvas id="analyticsChart" width="400" height="200" style="max-width:100%; height:auto;"></canvas></div>
                <div id="formbuilderTab" class="tab-content"><h2>Application Form Builder</h2><p>Select a job to attach this form:</p><select id="formJobSelect" style="margin-bottom:1rem;"></select><div class="form-builder-layout"><div class="components-panel"><h4><i class="fas fa-puzzle-piece"></i> Drag components</h4><div class="component-item" draggable="true" data-type="text"><i class="fas fa-font"></i> Text Input</div><div class="component-item" draggable="true" data-type="textarea"><i class="fas fa-align-left"></i> Textarea</div><div class="component-item" draggable="true" data-type="number"><i class="fas fa-calculator"></i> Number</div><div class="component-item" draggable="true" data-type="date"><i class="fas fa-calendar"></i> Date</div><div class="component-item" draggable="true" data-type="dropdown"><i class="fas fa-caret-down"></i> Dropdown</div><div class="component-item" draggable="true" data-type="checkbox"><i class="fas fa-check-square"></i> Checkbox</div><div class="component-item" draggable="true" data-type="file"><i class="fas fa-image"></i> File Upload</div></div><div class="form-builder-area" id="formFieldsContainer"></div></div><div style="margin-top:1rem; display:flex; gap:1rem;"><button id="saveFormBtn" class="btn-primary">Save Form</button><button id="previewFormBtn" class="btn-secondary">Preview Form</button></div></div>
                <div id="formsmanagerTab" class="tab-content"><h2>Forms Manager</h2><div id="formsManagerList"></div></div>
                <div id="submissionsTab" class="tab-content"><h2>Job Submissions</h2><select id="submissionJobSelect"></select><div id="submissionsList"></div></div>
                <div id="notificationsTab" class="tab-content"><h2>Notifications</h2><div id="notificationsList"></div><button id="requestPushBtn" class="btn-secondary">Enable Push Notifications</button></div>
                <div id="managejobsTab" class="tab-content"><h2>Manage Jobs</h2><div id="manageJobsList"></div></div>
                <div id="verifiedTab" class="tab-content"><h2>Verification Badge</h2><div id="verificationStatus"></div><button id="requestVerifyBtn" class="btn-primary">Request Verification</button><p style="margin-top:1rem; font-size:0.8rem;">Verification fee may apply. Admin will review your request.</p></div>
            `;
            attachTabEvents();
        }
        
        function attachTabEvents(){
            // Profile save
            const profileForm = document.getElementById('profileForm');
            if(profileForm){
                profileForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const updated = {
                        name: document.getElementById('compName')?.value.trim() || '',
                        website: document.getElementById('compWebsite')?.value.trim() || '',
                        ceo: document.getElementById('compCeo')?.value.trim() || '',
                        phone: document.getElementById('compPhone')?.value.trim() || '',
                        address: document.getElementById('compAddress')?.value.trim() || '',
                        email: document.getElementById('compEmail')?.value.trim() || '',
                        logo: companyData.logo
                    };
                    await saveCompanyProfile(updated);
                    companyData = { ...companyData, ...updated };
                    updateProfileUI();
                    showToast("Profile updated");
                });
            }
            
            // Logo upload
            const logoUpload = document.getElementById('logoUpload');
            if(logoUpload){
                logoUpload.addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    if(file){
                        const reader = new FileReader();
                        reader.onload = async (ev) => {
                            const url = await uploadToImgBB(ev.target.result);
                            if(url){
                                companyData.logo = url;
                                await saveCompanyProfile(companyData);
                                updateProfileUI();
                                showToast("Logo uploaded");
                            } else showToast("Logo upload failed", true);
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }
            
            // Searchable category
            const catInput = document.getElementById('categorySearchInput');
            const catDropdown = document.getElementById('categoryDropdown');
            const catHidden = document.getElementById('jobCategory');
            function filterCategories(filter){
                const filtered = COMPANY_CATEGORIES.filter(c => c.toLowerCase().includes(filter.toLowerCase()));
                if(catDropdown) catDropdown.innerHTML = filtered.map(c => `<div class="searchable-option" data-cat="${c}">${c}</div>`).join('');
                if(catDropdown) catDropdown.classList.add('show');
                document.querySelectorAll('.searchable-option').forEach(opt => {
                    opt.addEventListener('click', () => {
                        if(catInput) catInput.value = opt.getAttribute('data-cat');
                        if(catHidden) catHidden.value = opt.getAttribute('data-cat');
                        if(catDropdown) catDropdown.classList.remove('show');
                    });
                });
            }
            if(catInput){
                catInput.addEventListener('input', (e) => filterCategories(e.target.value));
                catInput.addEventListener('focus', () => filterCategories(catInput.value));
            }
            document.addEventListener('click', (e) => {
                if(catInput && catDropdown && !catInput.contains(e.target) && !catDropdown.contains(e.target)) {
                    catDropdown.classList.remove('show');
                }
            });
            
            // Post Job
            const jobForm = document.getElementById('jobPostForm');
            if(jobForm){
                jobForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const title = document.getElementById('jobTitle')?.value.trim();
                    const role = document.getElementById('jobRole')?.value.trim();
                    const category = catHidden ? catHidden.value : '';
                    const skills = document.getElementById('jobSkills')?.value.split(',').map(s=>s.trim()).filter(s=>s) || [];
                    const description = document.getElementById('jobDesc')?.value.trim();
                    const requirements = document.getElementById('jobRequirements')?.value.trim();
                    const amount = document.getElementById('payoutAmount')?.value;
                    const currency = document.getElementById('payoutCurrency')?.value;
                    const period = document.getElementById('payoutPeriod')?.value;
                    const deadline = document.getElementById('jobDeadline')?.value;
                    if(!title || !role || !category || !description){
                        showToast("Required fields missing", true);
                        return;
                    }
                    const newJob = {
                        title, role, category, skills, description, requirements,
                        payout: { amount, currency, period }, deadline
                    };
                    await addJob(newJob);
                    showToast("Job posted!");
                    if(jobForm) jobForm.reset();
                    await loadJobs();
                    await loadJobForms();
                    renderManageJobs();
                    renderFormsManager();
                    updateJobSelects();
                    updateAnalytics();
                });
            }
            
            // Form builder save
            const saveFormBtn = document.getElementById('saveFormBtn');
            if(saveFormBtn){
                saveFormBtn.addEventListener('click', async () => {
                    if(!selectedFormJobId){ showToast("Select a job first", true); return; }
                    await saveJobForm(selectedFormJobId, currentFormFields);
                    await loadJobForms();
                    renderFormsManager();
                    showToast("Form saved");
                });
            }
            
            // Preview form
            const previewBtn = document.getElementById('previewFormBtn');
            if(previewBtn){
                previewBtn.addEventListener('click', () => {
                    let previewHtml = '<h3>Form Preview</h3>';
                    currentFormFields.forEach(f => {
                        previewHtml += `<div><label>${escapeHtml(f.label)}</label>`;
                        if(f.type === 'text') previewHtml += `<input type="text" placeholder="${f.label}">`;
                        else if(f.type === 'textarea') previewHtml += `<textarea rows="2"></textarea>`;
                        else if(f.type === 'number') previewHtml += `<input type="number">`;
                        else if(f.type === 'date') previewHtml += `<input type="date">`;
                        else if(f.type === 'dropdown') previewHtml += `<select>${(f.options||[]).map(o=>`<option>${o}</option>`).join('')}</select>`;
                        else if(f.type === 'checkbox') previewHtml += `<div>${(f.options||[]).map(o=>`<label><input type="checkbox"> ${o}</label>`).join('')}</div>`;
                        else if(f.type === 'file') previewHtml += `<input type="file" multiple>`;
                        previewHtml += `</div><br>`;
                    });
                    const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex';
                    modal.innerHTML = `<div class="modal-content">${previewHtml}<button class="btn-secondary" onclick="this.closest('.modal').remove()">Close</button></div>`;
                    document.body.appendChild(modal);
                    modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
                });
            }
            
            // Push notifications
            const pushBtn = document.getElementById('requestPushBtn');
            if(pushBtn){
                pushBtn.addEventListener('click', () => {
                    if("Notification" in window) Notification.requestPermission();
                    else showToast("Not supported", true);
                });
            }
            
            // Request verification
            const verifyBtn = document.getElementById('requestVerifyBtn');
            if(verifyBtn){
                verifyBtn.addEventListener('click', async () => {
                    await requestVerification();
                    updateVerifiedUI();
                });
            }
            
            // Drag & drop components
            const components = document.querySelectorAll('.component-item');
            components.forEach(comp => {
                comp.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', comp.getAttribute('data-type')));
            });
            formContainer = document.getElementById('formFieldsContainer');
            if(formContainer){
                formContainer.addEventListener('dragover', (e) => e.preventDefault());
                formContainer.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const type = e.dataTransfer.getData('text/plain');
                    if(type) currentFormFields.push({ type, label: `New ${type}`, options: [], min: '', max: '', maxFiles: 1 });
                    renderFormBuilder();
                });
            }
        }
        
        // ---------- TAB SWITCHING ----------
        function switchTab(tabId){
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            const activeTab = document.getElementById(tabId+'Tab');
            if(activeTab) activeTab.classList.add('active');
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            const activeSidebar = document.querySelector(`.sidebar-item[data-tab="${tabId}"]`);
            if(activeSidebar) activeSidebar.classList.add('active');
            
            if(tabId === 'managejobs') renderManageJobs();
            if(tabId === 'submissions') renderSubmissions();
            if(tabId === 'analytics') updateAnalytics();
            if(tabId === 'notifications') renderNotifications();
            if(tabId === 'formbuilder') updateJobSelects();
            if(tabId === 'formsmanager') renderFormsManager();
            if(tabId === 'verified') updateVerifiedUI();
        }
        
        // ---------- INITIALIZATION ----------
        async function init(){
            let attempts = 0;
            while(!window.firebaseDb && attempts < 50){
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }
            if(!window.firebaseDb){
                showToast("Firebase failed to initialize", true);
                return;
            }
            db = window.firebaseDb;
            docRef = window.firebaseDoc;
            getDocFn = window.firebaseGetDoc;
            setDocFn = window.firebaseSetDoc;
            updateDocFn = window.firebaseUpdateDoc;
            addDocFn = window.firebaseAddDoc;
            getDocsFn = window.firebaseGetDocs;
            queryFn = window.firebaseQuery;
            whereFn = window.firebaseWhere;
            collectionFn = window.firebaseCollection;
            deleteDocFn = window.firebaseDeleteDoc;
            
            const storedUser = JSON.parse(localStorage.getItem('knk_current_user') || '{}');
            if(!storedUser.id || storedUser.type !== 'company'){
                window.location.href = 'auth.html';
                return;
            }
            companyId = storedUser.id;
            
            const profile = await loadCompanyProfile();
            if(profile) companyData = profile;
            else {
                companyData = {
                    name: storedUser.name || '',
                    email: storedUser.email || '',
                    category: '',
                    logo: '',
                    website: '',
                    ceo: '',
                    phone: '',
                    address: ''
                };
            }
            
            await Promise.all([
                loadJobs(),
                loadJobForms(),
                loadSubmissions(),
                loadNotifications(),
                loadVerificationStatus()
            ]);
            
            renderTabs();
            updateProfileUI();
            
            setTimeout(() => {
                document.querySelectorAll('.sidebar-item[data-tab]').forEach(el => {
                    el.addEventListener('click', () => switchTab(el.getAttribute('data-tab')));
                });
                switchTab('profile');
            }, 50);
            
            // Mobile menu
            const menuIcon = document.getElementById('menuIcon');
            const sidebar = document.getElementById('sidebar');
            if(menuIcon && sidebar){
                menuIcon.addEventListener('click', () => sidebar.classList.toggle('open'));
                document.addEventListener('click', (e) => {
                    if(window.innerWidth <= 800 && !sidebar.contains(e.target) && !menuIcon.contains(e.target)) {
                        sidebar.classList.remove('open');
                    }
                });
            }
            
            const logoutBtn = document.getElementById('logoutBtn');
            if(logoutBtn){
                logoutBtn.addEventListener('click', () => {
                    localStorage.removeItem('knk_current_user');
                    window.location.href = 'auth.html';
                });
            }
        }
        
        init();
    })();
</script>
</body>
</html>
