<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kazi ni Kazi · Real Estate Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, query, where, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBbhxmAkHJtq3Zs17P4ewHsc8wi8-0M_XI",
            authDomain: "developers-imw.firebaseapp.com",
            databaseURL: "https://developers-imw-default-rtdb.firebaseio.com",
            projectId: "developers-imw",
            storageBucket: "developers-imw.firebasestorage.app",
            messagingSenderId: "182400720989",
            appId: "1:182400720989:web:180f2390f7563f1ec96db4",
            measurementId: "G-R7RDM0PMY8"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.realEstateAuth = auth;
        window.realEstateDb = db;
        window.realEstateCreateUser = createUserWithEmailAndPassword;
        window.realEstateSignIn = signInWithEmailAndPassword;
        window.realEstateSignOut = signOut;
        window.realEstateDoc = doc;
        window.realEstateSetDoc = setDoc;
        window.realEstateGetDoc = getDoc;
        window.realEstateAddDoc = addDoc;
        window.realEstateGetDocs = getDocs;
        window.realEstateQuery = query;
        window.realEstateWhere = where;
        window.realEstateDeleteDoc = deleteDoc;
        window.realEstateUpdateDoc = updateDoc;
        window.realEstateCollection = collection;
    </script>
    <script src="config.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#f3f2ef;color:#191919;}
        .navbar{background:white;border-bottom:1px solid #e2e8f0;padding:0.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;position:sticky;top:0;z-index:100;}
        .logo-area{display:flex;align-items:center;gap:0.75rem;}
        .logo-area img{height:40px;width:auto;}
        .logo-text{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#0a66c2,#00a3ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .nav-center{position:absolute;left:50%;transform:translateX(-50%);}
        .nav-center .home-btn{background:#0a66c2;color:white;border:none;padding:0.5rem 1.2rem;border-radius:2rem;cursor:pointer;font-weight:600;font-size:0.9rem;}
        .user-info{display:flex;align-items:center;gap:1rem;}
        .container{max-width:1200px;margin:2rem auto;padding:0 1.5rem;}
        .card{background:white;border-radius:1rem;border:1px solid #e2e8f0;padding:1.5rem;margin-bottom:2rem;}
        .card h2{margin-bottom:1rem;font-size:1.3rem;}
        .form-group{margin-bottom:1rem;}
        label{font-weight:600;font-size:0.85rem;display:block;margin-bottom:0.3rem;color:#1e293b;}
        input,select,textarea{width:100%;padding:0.7rem;border:1px solid #cbd5e1;border-radius:0.5rem;font-family:inherit;font-size:0.9rem;}
        .inline-row{display:flex;gap:0.8rem;flex-wrap:wrap;}
        .inline-row .form-group{flex:1;min-width:140px;}
        button.btn-primary{background:#0a66c2;color:white;border:none;padding:0.6rem 1.2rem;border-radius:2rem;cursor:pointer;font-weight:600;}
        button.btn-secondary{background:#e2e8f0;color:#334155;border:none;padding:0.6rem 1.2rem;border-radius:2rem;cursor:pointer;}
        button.btn-danger{background:#dc2626;color:white;border:none;padding:0.4rem 0.8rem;border-radius:2rem;cursor:pointer;font-size:0.75rem;}
        .homes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;margin-top:1rem;}
        .home-card{border:1px solid #e2e8f0;border-radius:1rem;overflow:hidden;background:white;}
        .home-img{height:180px;background-size:cover;background-position:center;background-color:#eef3fc;}
        .home-info{padding:0.8rem;}
        .home-title{font-weight:700;font-size:1rem;}
        .home-location{font-size:0.75rem;color:#5e6f8d;}
        .home-price{font-weight:700;color:#0a66c2;margin-top:0.3rem;}
        .home-details{font-size:0.7rem;margin-top:0.3rem;color:#64748b;}
        .card-actions{display:flex;gap:0.5rem;margin-top:0.5rem;justify-content:flex-end;}
        .toggle-buttons{display:flex;gap:1rem;margin-bottom:1.5rem;}
        .toggle-btn{flex:1;text-align:center;padding:0.6rem;border-radius:2rem;cursor:pointer;background:#f1f5f9;font-weight:600;}
        .toggle-btn.active{background:#0a66c2;color:white;}
        .amenities-group{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.3rem;}
        .amenity-checkbox{display:flex;align-items:center;gap:0.3rem;font-size:0.8rem;}
        .toast{position:fixed;bottom:20px;right:20px;background:#1f2937;color:white;padding:0.6rem 1.2rem;border-radius:40px;z-index:1000;}
        @media(max-width:800px){
            .container{padding:0 1rem;}
            .nav-center{position:relative;left:0;transform:none;}
        }
        .loader{display:inline-block;width:18px;height:18px;border:2px solid white;border-radius:50%;border-top-color:transparent;animation:spin 0.6s linear infinite;margin-right:8px;vertical-align:middle;}
        @keyframes spin{to{transform:rotate(360deg);}}
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo-area"><img src="images/logo.png" alt="Kazi ni Kazi" onerror="this.src='https://placehold.co/140x40'"><span class="logo-text">Kazi ni Kazi · Real Estate</span></div>
    <div class="nav-center">
        <button class="home-btn" id="homeBtn"><i class="fas fa-home"></i> Home</button>
    </div>
    <div class="user-info" id="userInfo">
        <span id="userNameDisplay"></span>
        <button class="btn-secondary" id="logoutBtn" style="display:none;">Logout</button>
    </div>
</nav>

<div class="container">
    <div id="authSection" class="card">
        <div class="toggle-buttons">
            <div class="toggle-btn active" id="showLoginBtn">Sign In</div>
            <div class="toggle-btn" id="showSignupBtn">Create Account</div>
        </div>
        <div id="loginForm">
            <h2>Sign in to Real Estate Dashboard</h2>
            <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="agent@realestate.com"></div>
            <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••"></div>
            <button class="btn-primary" id="doLoginBtn">Sign In</button>
        </div>
        <div id="signupForm" style="display:none;">
            <h2>Create Real Estate Account</h2>
            <p style="font-size:0.8rem; color:#5e6f8d;">This account is hidden from public. Only you can manage home listings.</p>
            <div class="form-group"><label>Full Name</label><input type="text" id="signupName" placeholder="Agency Name or Agent Name"></div>
            <div class="form-group"><label>Email</label><input type="email" id="signupEmail" placeholder="agent@realestate.com"></div>
            <div class="form-group"><label>Password</label><input type="password" id="signupPassword" placeholder="Min 6 characters"></div>
            <button class="btn-primary" id="doSignupBtn">Create Account</button>
        </div>
    </div>

    <div id="homesSection" style="display:none;">
        <div class="card">
            <h2><i class="fas fa-plus-circle"></i> Add New Property</h2>
            <form id="addHomeForm">
                <div class="form-group"><label>Title *</label><input type="text" id="homeTitle" required placeholder="e.g., Modern 2BR Apartment"></div>
                <div class="inline-row">
                    <div class="form-group"><label>Property Type</label><select id="homeType"><option value="Apartment">Apartment</option><option value="House">House</option><option value="Villa">Villa</option><option value="Condo">Condo</option><option value="Land">Land</option><option value="Commercial">Commercial</option></select></div>
                    <div class="form-group"><label>Location *</label><input type="text" id="homeLocation" required placeholder="Kigali, Gasabo"></div>
                </div>
                <div class="inline-row">
                    <div class="form-group"><label>Price *</label><input type="text" id="homePrice" required placeholder="$45/night or $500/month"></div>
                    <div class="form-group"><label>Area (sqm)</label><input type="number" id="homeArea" placeholder="e.g., 120"></div>
                </div>
                <div class="inline-row">
                    <div class="form-group"><label>Bedrooms</label><input type="number" id="homeBedrooms" placeholder="2"></div>
                    <div class="form-group"><label>Bathrooms</label><input type="number" id="homeBathrooms" placeholder="1"></div>
                </div>
                <div class="form-group"><label>Amenities (select multiple)</label>
                    <div class="amenities-group" id="amenitiesGroup">
                        <label class="amenity-checkbox"><input type="checkbox" value="Parking"> Parking</label>
                        <label class="amenity-checkbox"><input type="checkbox" value="Pool"> Pool</label>
                        <label class="amenity-checkbox"><input type="checkbox" value="Gym"> Gym</label>
                        <label class="amenity-checkbox"><input type="checkbox" value="WiFi"> WiFi</label>
                        <label class="amenity-checkbox"><input type="checkbox" value="Air Conditioning"> AC</label>
                        <label class="amenity-checkbox"><input type="checkbox" value="Security"> Security</label>
                        <label class="amenity-checkbox"><input type="checkbox" value="Furnished"> Furnished</label>
                    </div>
                </div>
                <div class="form-group"><label>Description</label><textarea id="homeDesc" rows="3" placeholder="Describe the property..."></textarea></div>
                <div class="form-group"><label>Nearby Landmarks</label><input type="text" id="homeLandmarks" placeholder="e.g., City Mall, Bus station"></div>
                <div class="form-group"><label>Contact Phone (optional)</label><input type="tel" id="homePhone" placeholder="+250..."></div>
                <div class="form-group"><label>Image URL</label><input type="url" id="homeImage" placeholder="https://... (optional)"></div>
                <button type="submit" class="btn-primary">Add Property</button>
            </form>
        </div>

        <div class="card">
            <h2><i class="fas fa-home"></i> My Listed Properties</h2>
            <div id="homesListContainer"><p style="text-align:center; color:#5e6f8d;">Loading...</p></div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- FIREBASE REFERENCES ----------
        let auth = null;
        let db = null;
        let createUser = null;
        let signIn = null;
        let signOut = null;
        let docRef = null;
        let setDocFn = null;
        let getDocFn = null;
        let addDocFn = null;
        let getDocsFn = null;
        let queryFn = null;
        let whereFn = null;
        let deleteDocFn = null;
        let updateDocFn = null;
        let collectionFn = null;
        
        let currentUserId = null;
        let currentUserEmail = null;
        let currentUserName = null;
        
        function showToast(msg, isErr=false){
            let t=document.createElement('div'); t.className='toast'; t.style.background=isErr?'#dc2626':'#1f2937'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
        }
        
        function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
        
        async function uploadToImgBB(base64Image){
            if(!base64Image) return null;
            let raw = base64Image.includes(',') ? base64Image.split(',')[1] : base64Image;
            const formData = new FormData();
            formData.append('image', raw);
            formData.append('key', KAZI_CONFIG.imgbb.apiKey);
            try{
                const res = await fetch(KAZI_CONFIG.imgbb.uploadUrl, { method:'POST', body:formData });
                const data = await res.json();
                return data.success ? data.data.url : null;
            } catch(e){ return null; }
        }
        
        // Load homes from Firestore
        async function loadHomes(){
            if(!currentUserId) return;
            const q = queryFn(collectionFn(db, "realEstateHomes"), whereFn("userId", "==", currentUserId));
            const snapshot = await getDocsFn(q);
            const homes = [];
            snapshot.forEach(docSnap => {
                homes.push({ id: docSnap.id, ...docSnap.data() });
            });
            renderHomesList(homes);
        }
        
        function renderHomesList(homes){
            const container = document.getElementById('homesListContainer');
            if(!container) return;
            if(homes.length === 0){
                container.innerHTML = '<p style="text-align:center; color:#5e6f8d;">No properties added yet. Use the form above to list your first property.</p>';
                return;
            }
            let html = `<div class="homes-grid">`;
            homes.forEach(home => {
                const amenities = home.amenities ? home.amenities.join(', ') : '';
                html += `
                    <div class="home-card" data-id="${home.id}">
                        <div class="home-img" style="background-image: url('${home.image_url || 'https://placehold.co/400x200?text=No+Image'}');"></div>
                        <div class="home-info">
                            <div class="home-title">${escapeHtml(home.title)}</div>
                            <div class="home-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(home.location)}</div>
                            <div class="home-price">${escapeHtml(home.price)}</div>
                            <div class="home-details">🏠 ${escapeHtml(home.propertyType || 'House')} · 🛏️ ${home.bedrooms || '?'} beds · 🛁 ${home.bathrooms || '?'} baths · 📐 ${home.area || '?'} sqm</div>
                            ${amenities ? `<div class="home-details"><i class="fas fa-wifi"></i> ${escapeHtml(amenities)}</div>` : ''}
                            <div class="card-actions">
                                <button class="btn-secondary edit-home" data-id="${home.id}">Edit</button>
                                <button class="btn-danger delete-home" data-id="${home.id}">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            container.innerHTML = html;
            
            document.querySelectorAll('.edit-home').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    editHomeById(id, homes);
                });
            });
            document.querySelectorAll('.delete-home').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    if(confirm('Delete this property listing?')){
                        await deleteDocFn(docRef(db, "realEstateHomes", id));
                        showToast('Property deleted');
                        await loadHomes();
                    }
                });
            });
        }
        
        function editHomeById(id, homes){
            const home = homes.find(h => h.id === id);
            if(!home) return;
            document.getElementById('homeTitle').value = home.title || '';
            document.getElementById('homeType').value = home.propertyType || 'Apartment';
            document.getElementById('homeLocation').value = home.location || '';
            document.getElementById('homePrice').value = home.price || '';
            document.getElementById('homeArea').value = home.area || '';
            document.getElementById('homeBedrooms').value = home.bedrooms || '';
            document.getElementById('homeBathrooms').value = home.bathrooms || '';
            document.getElementById('homeDesc').value = home.description || '';
            document.getElementById('homeLandmarks').value = home.landmarks || '';
            document.getElementById('homePhone').value = home.phone || '';
            document.getElementById('homeImage').value = home.image_url || '';
            // Check amenities checkboxes
            const amenitiesList = home.amenities || [];
            document.querySelectorAll('#amenitiesGroup input[type="checkbox"]').forEach(cb => {
                cb.checked = amenitiesList.includes(cb.value);
            });
            // Change form submit behavior to update
            const form = document.getElementById('addHomeForm');
            const originalSubmit = form.onsubmit;
            form.onsubmit = async (e) => {
                e.preventDefault();
                const selectedAmenities = Array.from(document.querySelectorAll('#amenitiesGroup input[type="checkbox"]:checked')).map(cb => cb.value);
                const updatedHome = {
                    userId: currentUserId,
                    title: document.getElementById('homeTitle').value.trim(),
                    propertyType: document.getElementById('homeType').value,
                    location: document.getElementById('homeLocation').value.trim(),
                    price: document.getElementById('homePrice').value.trim(),
                    area: document.getElementById('homeArea').value,
                    bedrooms: document.getElementById('homeBedrooms').value,
                    bathrooms: document.getElementById('homeBathrooms').value,
                    description: document.getElementById('homeDesc').value,
                    amenities: selectedAmenities,
                    landmarks: document.getElementById('homeLandmarks').value,
                    phone: document.getElementById('homePhone').value,
                    image_url: document.getElementById('homeImage').value,
                    updatedAt: new Date().toISOString()
                };
                await updateDocFn(docRef(db, "realEstateHomes", id), updatedHome);
                showToast('Property updated');
                form.reset();
                form.onsubmit = originalSubmit;
                await loadHomes();
                // Clear the image preview if any
                const imageInput = document.getElementById('homeImage');
                if(imageInput) imageInput.value = '';
            };
            showToast('Editing: modify and click Add Property (will update)');
        }
        
        // Auth UI
        async function renderAuthUI(){
            if(currentUserId){
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('homesSection').style.display = 'block';
                document.getElementById('userNameDisplay').innerText = currentUserName || 'Agent';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                await loadHomes();
            } else {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('homesSection').style.display = 'none';
                document.getElementById('userNameDisplay').innerText = '';
                document.getElementById('logoutBtn').style.display = 'none';
            }
        }
        
        // Signup
        async function handleSignup(){
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            if(!name || !email || !password){
                showToast('All fields required', true);
                return;
            }
            if(password.length < 6){
                showToast('Password must be at least 6 characters', true);
                return;
            }
            try{
                const userCredential = await createUser(auth, email, password);
                const userId = userCredential.user.uid;
                await setDocFn(docRef(db, "realEstateAgents", userId), {
                    name: name,
                    email: email,
                    createdAt: new Date().toISOString()
                });
                currentUserId = userId;
                currentUserEmail = email;
                currentUserName = name;
                showToast('Account created successfully!');
                renderAuthUI();
            } catch(err){
                showToast(err.message, true);
            }
        }
        
        // Login
        async function handleLogin(){
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if(!email || !password){
                showToast('Email and password required', true);
                return;
            }
            try{
                const userCredential = await signIn(auth, email, password);
                const userId = userCredential.user.uid;
                const agentDoc = await getDocFn(docRef(db, "realEstateAgents", userId));
                if(!agentDoc.exists()){
                    showToast('Agent profile not found', true);
                    return;
                }
                currentUserId = userId;
                currentUserEmail = email;
                currentUserName = agentDoc.data().name;
                showToast(`Welcome back, ${currentUserName}`);
                renderAuthUI();
            } catch(err){
                showToast(err.message, true);
            }
        }
        
        async function handleLogout(){
            await signOut(auth);
            currentUserId = null;
            currentUserEmail = null;
            currentUserName = null;
            renderAuthUI();
            showToast('Logged out');
        }
        
        // Add home
        async function addHome(e){
            e.preventDefault();
            if(!currentUserId){
                showToast('Please login first', true);
                return;
            }
            const title = document.getElementById('homeTitle').value.trim();
            const location = document.getElementById('homeLocation').value.trim();
            const price = document.getElementById('homePrice').value.trim();
            if(!title || !location || !price){
                showToast('Title, location and price are required', true);
                return;
            }
            const selectedAmenities = Array.from(document.querySelectorAll('#amenitiesGroup input[type="checkbox"]:checked')).map(cb => cb.value);
            const newHome = {
                userId: currentUserId,
                title: title,
                propertyType: document.getElementById('homeType').value,
                location: location,
                price: price,
                area: document.getElementById('homeArea').value,
                bedrooms: document.getElementById('homeBedrooms').value,
                bathrooms: document.getElementById('homeBathrooms').value,
                description: document.getElementById('homeDesc').value,
                amenities: selectedAmenities,
                landmarks: document.getElementById('homeLandmarks').value,
                phone: document.getElementById('homePhone').value,
                image_url: document.getElementById('homeImage').value,
                createdAt: new Date().toISOString()
            };
            await addDocFn(collectionFn(db, "realEstateHomes"), newHome);
            showToast('Property added successfully');
            document.getElementById('addHomeForm').reset();
            document.querySelectorAll('#amenitiesGroup input[type="checkbox"]').forEach(cb => cb.checked = false);
            await loadHomes();
        }
        
        // Initialize Firebase and UI
        async function init(){
            let attempts = 0;
            while(!window.realEstateAuth && attempts < 50){
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }
            if(!window.realEstateAuth){
                showToast("Firebase failed to initialize", true);
                return;
            }
            auth = window.realEstateAuth;
            db = window.realEstateDb;
            createUser = window.realEstateCreateUser;
            signIn = window.realEstateSignIn;
            signOut = window.realEstateSignOut;
            docRef = window.realEstateDoc;
            setDocFn = window.realEstateSetDoc;
            getDocFn = window.realEstateGetDoc;
            addDocFn = window.realEstateAddDoc;
            getDocsFn = window.realEstateGetDocs;
            queryFn = window.realEstateQuery;
            whereFn = window.realEstateWhere;
            deleteDocFn = window.realEstateDeleteDoc;
            updateDocFn = window.realEstateUpdateDoc;
            collectionFn = window.realEstateCollection;
            
            // Check for existing session
            auth.onAuthStateChanged(async (user) => {
                if(user){
                    const agentDoc = await getDocFn(docRef(db, "realEstateAgents", user.uid));
                    if(agentDoc.exists()){
                        currentUserId = user.uid;
                        currentUserEmail = user.email;
                        currentUserName = agentDoc.data().name;
                    }
                } else {
                    currentUserId = null;
                }
                renderAuthUI();
            });
            
            // Form event listeners
            document.getElementById('doSignupBtn').addEventListener('click', handleSignup);
            document.getElementById('doLoginBtn').addEventListener('click', handleLogin);
            document.getElementById('logoutBtn').addEventListener('click', handleLogout);
            document.getElementById('addHomeForm').addEventListener('submit', addHome);
            
            // Toggle between login/signup
            const showLoginBtn = document.getElementById('showLoginBtn');
            const showSignupBtn = document.getElementById('showSignupBtn');
            const loginFormDiv = document.getElementById('loginForm');
            const signupFormDiv = document.getElementById('signupForm');
            showLoginBtn.addEventListener('click', () => {
                showLoginBtn.classList.add('active');
                showSignupBtn.classList.remove('active');
                loginFormDiv.style.display = 'block';
                signupFormDiv.style.display = 'none';
            });
            showSignupBtn.addEventListener('click', () => {
                showSignupBtn.classList.add('active');
                showLoginBtn.classList.remove('active');
                loginFormDiv.style.display = 'none';
                signupFormDiv.style.display = 'block';
            });
            
            // Home button
            document.getElementById('homeBtn').addEventListener('click', () => {
                window.location.href = 'index.html';
            });
        }
        
        init();
    })();
</script>
</body>
</html>
