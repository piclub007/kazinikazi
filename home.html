<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kazi ni Kazi · Property Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBbhxmAkHJtq3Zs17P4ewHsc8wi8-0M_XI",
            authDomain: "developers-imw.firebaseapp.com",
            databaseURL: "https://developers-imw-default-rtdb.firebaseio.com",
            projectId: "developers-imw",
            storageBucket: "developers-imw.firebasestorage.app",
            messagingSenderId: "182400720989",
            appId: "1:182400720989:web:180f2390f7563f1ec96db4",
            measurementId: "G-R7RDM0PMY8"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.__db = db;
        window.__doc = doc;
        window.__getDoc = getDoc;
    </script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#f7f9fc;color:#0f172a;font-size:14px;line-height:1.5;padding:1rem;}
        .container{max-width:800px;margin:0 auto;}
        .back-btn{background:transparent;border:none;font-size:1rem;cursor:pointer;color:#0a66c2;margin-bottom:1rem;display:inline-flex;align-items:center;gap:0.3rem;}
        .property-card{background:white;border-radius:1rem;border:1px solid #e2e8f0;padding:1.5rem;margin-bottom:1rem;}
        .main-image{width:100%;height:240px;background-size:cover;background-position:center;border-radius:0.8rem;margin-bottom:1rem;background-color:#eef2ff;}
        .title{font-size:1.3rem;font-weight:700;margin-bottom:0.2rem;}
        .location{color:#475569;margin-bottom:0.5rem;}
        .price{font-size:1.2rem;font-weight:700;color:#0a66c2;margin-bottom:1rem;}
        .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin:1rem 0;}
        .info-item{background:#f8fafc;padding:0.6rem;border-radius:0.8rem;}
        .info-label{font-weight:600;font-size:0.7rem;color:#64748b;}
        .info-value{font-weight:500;margin-top:0.2rem;}
        .amenities{display:flex;flex-wrap:wrap;gap:0.4rem;margin:1rem 0;}
        .amenity-tag{background:#eef2ff;padding:0.2rem 0.6rem;border-radius:30px;font-size:0.7rem;}
        .maps-link{margin-top:1rem;}
        .maps-link a{color:#0a66c2;text-decoration:none;}
        .toast{position:fixed;bottom:20px;right:20px;background:#1e293b;color:white;padding:0.4rem 1rem;border-radius:40px;z-index:1100;font-size:0.75rem;}
        @media (max-width:600px){body{padding:0.8rem;}.main-image{height:180px;}}
    </style>
</head>
<body>
<div class="container">
    <button class="back-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i> Back</button>
    <div id="homeContent">Loading...</div>
</div>
<script>
    (function(){
        const db = window.__db;
        const docRef = window.__doc;
        const getDocFn = window.__getDoc;
        
        async function loadHomeDetails(){
            const homeId = localStorage.getItem('knk_selected_home');
            if(!homeId){
                document.getElementById('homeContent').innerHTML = '<div class="property-card">No property selected. <button onclick="window.history.back()">Go back</button></div>';
                return;
            }
            try{
                const homeDoc = await getDocFn(docRef(db, "realEstateHomes", homeId));
                if(!homeDoc.exists()){
                    document.getElementById('homeContent').innerHTML = '<div class="property-card">Property not found.</div>';
                    return;
                }
                const home = homeDoc.data();
                const images = home.images || [];
                const mainImage = images.length ? images[0] : 'https://placehold.co/800x400?text=No+Image';
                const amenities = home.amenities || [];
                const mapsLink = home.mapsLink;
                const phone = home.phone;
                const html = `
                    <div class="property-card">
                        <div class="main-image" style="background-image:url('${mainImage}');"></div>
                        <div class="title">${escapeHtml(home.title)}</div>
                        <div class="location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(home.location)}</div>
                        <div class="price">${escapeHtml(home.price)}</div>
                        <div class="info-grid">
                            <div class="info-item"><div class="info-label">Property Type</div><div class="info-value">${escapeHtml(home.propertyType || 'House')}</div></div>
                            <div class="info-item"><div class="info-label">Area</div><div class="info-value">${home.area ? home.area+' sqm' : 'Not specified'}</div></div>
                            <div class="info-item"><div class="info-label">Bedrooms</div><div class="info-value">${home.bedrooms || '?'}</div></div>
                            <div class="info-item"><div class="info-label">Bathrooms</div><div class="info-value">${home.bathrooms || '?'}</div></div>
                        </div>
                        <div><strong>Description</strong><br>${escapeHtml(home.description || 'No description provided.')}</div>
                        ${amenities.length ? `<div class="amenities"><strong>Amenities:</strong> ${amenities.map(a => `<span class="amenity-tag">${escapeHtml(a)}</span>`).join('')}</div>` : ''}
                        ${home.landmarks ? `<div><strong>Nearby landmarks:</strong> ${escapeHtml(home.landmarks)}</div>` : ''}
                        ${mapsLink ? `<div class="maps-link"><i class="fas fa-map"></i> <a href="${mapsLink}" target="_blank">View on Google Maps</a></div>` : ''}
                        ${phone ? `<div><i class="fas fa-phone"></i> Contact: ${escapeHtml(phone)}</div>` : ''}
                    </div>
                    <div class="property-card">
                        <div class="section-title">📸 More Images</div>
                        <div style="display:flex; gap:0.5rem; overflow-x:auto; padding:0.5rem 0;">
                            ${images.slice(1).map(img => `<img src="${img}" style="width:100px; height:80px; object-fit:cover; border-radius:8px;">`).join('') || '<p>No additional images</p>'}
                        </div>
                    </div>
                `;
                document.getElementById('homeContent').innerHTML = html;
            } catch(e){
                console.error(e);
                document.getElementById('homeContent').innerHTML = '<div class="property-card">Error loading property details.</div>';
            }
        }
        function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');}
        loadHomeDetails();
    })();
</script>
</body>
</html>
